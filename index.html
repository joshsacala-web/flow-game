<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin:0; background:#020617; overflow:hidden; font-family:sans-serif; color:white; }

#ui {
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 font-size:20px;
}

#centerMsg{
 position:fixed;
 top:50%;
 width:100%;
 text-align:center;
 font-size:28px;
 transform:translateY(-50%);
 white-space:pre-line;
}

.heart { position:absolute; font-size:26px; }

#player {
 position:absolute;
 font-size:36px;
 left:50%;
 top:50%;
 transform:translate(-50%,-50%);
}
</style>
</head>
<body>

<div id="ui"></div>
<div id="centerMsg">Tap to Start ❤️</div>
<div id="player">❤️</div>

<script>
let player = document.getElementById("player");
let hearts = [];
let time = 15;
let playing = false;
let difficulty = 1;

// SCORE SYSTEM
let survivalTime = 0;
let bestTime = parseFloat(localStorage.getItem("bestTime")) || 0;

// AUDIO
let ctxAudio = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq,duration){
 let osc = ctxAudio.createOscillator();
 let gain = ctxAudio.createGain();
 osc.connect(gain);
 gain.connect(ctxAudio.destination);
 osc.frequency.value = freq;
 osc.start();
 gain.gain.setValueAtTime(0.1, ctxAudio.currentTime);
 osc.stop(ctxAudio.currentTime + duration);
}

// START GAME
document.body.addEventListener("click", start);

function start(){
 if(playing) return;

 playing = true;
 time = 15;
 difficulty = 1;
 survivalTime = 0;

 hearts.forEach(h=>h.remove());
 hearts=[];

 document.getElementById("centerMsg").innerText="";
}

// MOVEMENT
document.addEventListener("mousemove", move);
document.addEventListener("touchmove", move);

function move(e){
 let x = e.touches ? e.touches[0].clientX : e.clientX;
 let y = e.touches ? e.touches[0].clientY : e.clientY;

 player.style.left = x + "px";
 player.style.top = y + "px";
}

// SPAWN HEARTS
function spawn(){
 let h = document.createElement("div");
 h.className = "heart";

 let r = Math.random();

 if(r > 0.95){
   h.type="power";
   h.innerHTML = "<span style='color:#ffd966; filter: drop-shadow(0 0 6px #ffd966);'>💛</span>";
 } else if(r > 0.35){
   h.type="good";
   h.innerHTML = "<span style='color:#ff6b6b;'>❤️</span>";
 } else {
   h.type="bad";
   h.innerHTML = "<span style='color:#22d3ee; filter: drop-shadow(0 0 6px #22d3ee);'>💙</span>";
 }

 h.x = Math.random()*innerWidth;
 h.y = -20;
 h.speed = 3 + Math.random()*2 + difficulty;

 h.style.left = h.x+"px";
 h.style.top = h.y+"px";

 document.body.appendChild(h);
 hearts.push(h);
}

// GAME LOOP
setInterval(()=>{

 if(!playing) return;

 difficulty += 0.001;

 if(Math.random() < 0.15 + difficulty*0.02) spawn();

 hearts.forEach(h=>{
   h.y += h.speed;
   h.style.top = h.y+"px";

   let px = player.offsetLeft;
   let py = player.offsetTop;

   if(Math.abs(px-h.x)<30 && Math.abs(py-h.y)<30){

     if(h.type==="good"){
       time += 1;
       beep(500,0.08);
     }

     if(h.type==="power"){
       time += 10;
       beep(900,0.12);
     }

     if(h.type==="bad"){
       time -= 8;
       beep(200,0.15);
     }

     h.remove();
   }

   if(h.y>innerHeight) h.remove();
 });

 hearts = hearts.filter(h=>h.isConnected);

 // TRACK SURVIVAL
 survivalTime += 0.03;

 // TIME DRAIN
 time -= 0.04 + difficulty*0.01;

 if(time <= 0){
   playing=false;

   let finalTime = survivalTime.toFixed(1);

   if(finalTime > bestTime){
     bestTime = finalTime;
     localStorage.setItem("bestTime", bestTime);
   }

   document.getElementById("centerMsg").innerText =
     "💀 Survived: " + finalTime + "s\n🏆 Best: " + bestTime + "s\nTap to retry";
 }

 document.getElementById("ui").innerText =
   "Time: "+Math.max(0,time.toFixed(1));

},30);
</script>

</body>
</html>
