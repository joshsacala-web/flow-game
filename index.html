<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin:0; background:#020617; overflow:hidden; font-family:sans-serif; color:white; }

#ui {
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 font-size:20px;
}

#centerMsg{
 position:fixed;
 top:50%;
 width:100%;
 text-align:center;
 font-size:28px;
 transform:translateY(-50%);
}

.heart { position:absolute; font-size:26px; }

#player {
 position:absolute;
 font-size:36px;
 left:50%;
 top:50%;
 transform:translate(-50%,-50%);
}
</style>
</head>
<body>

<div id="ui"></div>
<div id="centerMsg">Tap to Start ❤️</div>
<div id="player">❤️</div>

<script>
let player = document.getElementById("player");
let hearts = [];
let time = 15;
let playing = false;
let difficulty = 1;

// AUDIO
let ctxAudio = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq,duration){
 let osc = ctxAudio.createOscillator();
 let gain = ctxAudio.createGain();
 osc.connect(gain);
 gain.connect(ctxAudio.destination);
 osc.frequency.value = freq;
 osc.start();
 gain.gain.setValueAtTime(0.1, ctxAudio.currentTime);
 osc.stop(ctxAudio.currentTime + duration);
}

// start
document.body.addEventListener("click", start);

function start(){
 if(playing) return;

 playing = true;
 time = 15;
 difficulty = 1;

 hearts.forEach(h=>h.remove());
 hearts=[];

 document.getElementById("centerMsg").innerText="";
}

// movement
document.addEventListener("mousemove", move);
document.addEventListener("touchmove", move);

function move(e){
 let x = e.touches ? e.touches[0].clientX : e.clientX;
 let y = e.touches ? e.touches[0].clientY : e.clientY;

 player.style.left = x + "px";
 player.style.top = y + "px";
}

// spawn (FIXED BALANCE)
function spawn(){
 let h = document.createElement("div");
 h.className = "heart";

 let r = Math.random();

 if(r > 0.92){
   h.type="power"; // 💛 rare
   h.innerText="💛";
 } else if(r > 0.5){
   h.type="green"; // 🟢 COMMON
   h.innerText="🟢";
 } else if(r > 0.2){
   h.type="good"; // ❤️
   h.innerText="❤️";
 } else {
   h.type="bad"; // 🖤 more frequent
   h.innerHTML = "<span style='color:black; filter: drop-shadow(0 0 3px white);'>🖤</span>";
 }

 h.x = Math.random()*innerWidth;
 h.y = -20;
 h.speed = 2 + Math.random()*2 + difficulty;

 h.style.left = h.x+"px";
 h.style.top = h.y+"px";

 document.body.appendChild(h);
 hearts.push(h);
}

// loop
setInterval(()=>{

 if(!playing) return;

 // increasing difficulty
 difficulty += 0.0008;

 // faster spawn over time
 if(Math.random() < 0.15 + difficulty*0.02) spawn();

 hearts.forEach(h=>{
   h.y += h.speed;
   h.style.top = h.y+"px";

   let px = player.offsetLeft;
   let py = player.offsetTop;

   if(Math.abs(px-h.x)<30 && Math.abs(py-h.y)<30){

     if(h.type==="good"){
       time += 1;
       beep(500,0.08);
     }

     if(h.type==="green"){
       time += 3;
       beep(700,0.08);
     }

     if(h.type==="power"){
       time += 10;
       beep(900,0.12);
     }

     if(h.type==="bad"){
       time -= 10;
       beep(200,0.15);
     }

     h.remove();
   }

   if(h.y>innerHeight) h.remove();
 });

 hearts = hearts.filter(h=>h.isConnected);

 // timer drains faster over time
 time -= 0.04 + difficulty*0.01;

 if(time <= 0){
   playing=false;
   document.getElementById("centerMsg").innerText =
     "💀 Survived — Tap to try again";
 }

 document.getElementById("ui").innerText =
   "Time: "+Math.max(0,time.toFixed(1));

},30);
</script>

</body>
</html>
