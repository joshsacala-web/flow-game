<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Heart Maze Game</title>
<style>
body { margin:0; background:black; overflow:hidden; }
canvas { display:block; }

#joystick {
 position:absolute;
 bottom:30px;
 left:50%;
 transform:translateX(-50%);
 width:110px; height:110px;
 border-radius:50%;
 background:rgba(255,255,255,0.15);
}

#stick {
 position:absolute;
 width:40px; height:40px;
 border-radius:50%;
 background:#00eaff;
 left:35px; top:35px;
}
</style>
</head>

<body>

<canvas id="game"></canvas>
<div id="joystick"><div id="stick"></div></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

const size = 20;
const cols = 31;
const rows = 31;

let grid = [];
let player = {x:15,y:25};

let joyX=0, joyY=0;

function inHeart(x,y){
 let nx = (x-cols/2)/(cols/2);
 let ny = (y-rows/2)/(rows/2);
 return Math.pow(nx*nx+ny*ny-1,3) - nx*nx*ny*ny*ny < 0;
}

function generate(){
 grid = Array.from({length:rows},()=>Array(cols).fill(1));

 function carve(x,y){
  let dirs=[[1,0],[-1,0],[0,1],[0,-1]].sort(()=>Math.random()-0.5);
  for(let [dx,dy] of dirs){
   let nx=x+dx*2, ny=y+dy*2;

   if(grid[ny] && grid[ny][nx]===1 && inHeart(nx,ny)){
     grid[ny][nx]=0;
     grid[y+dy][x+dx]=0;
     carve(nx,ny);
   }
  }
 }

 for(let y=0;y<rows;y++){
  for(let x=0;x<cols;x++){
    if(inHeart(x,y)) grid[y][x]=1;
    else grid[y][x]=2;
  }
 }

 grid[player.y][player.x]=0;
 carve(player.x,player.y);
}

const stick=document.getElementById("stick");

document.getElementById("joystick").addEventListener("touchmove", e=>{
 let rect=e.target.getBoundingClientRect();
 let x=e.touches[0].clientX-rect.left-55;
 let y=e.touches[0].clientY-rect.top-55;

 joyX=Math.max(-1,Math.min(1,x/40));
 joyY=Math.max(-1,Math.min(1,y/40));

 stick.style.left=(55+joyX*30)+"px";
 stick.style.top=(55+joyY*30)+"px";
});

document.getElementById("joystick").addEventListener("touchend", ()=>{
 joyX=0; joyY=0;
 stick.style.left="35px";
 stick.style.top="35px";
});

function move(){
 let dx=0, dy=0;

 if(Math.abs(joyX)>Math.abs(joyY)){
   dx = joyX>0.5?1:joyX<-0.5?-1:0;
 } else {
   dy = joyY>0.5?1:joyY<-0.5?-1:0;
 }

 let nx=player.x+dx;
 let ny=player.y+dy;

 if(grid[ny] && grid[ny][nx]===0){
   player.x=nx;
   player.y=ny;
 }
}

generate();

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 let offX=(canvas.width-cols*size)/2;
 let offY=(canvas.height-rows*size)/2;

 for(let y=0;y<rows;y++){
  for(let x=0;x<cols;x++){
   if(grid[y][x]===2) continue;

   ctx.fillStyle = grid[y][x] ? "#222" : "#111";
   ctx.fillRect(offX+x*size, offY+y*size, size, size);
  }
 }

 move();

 ctx.fillStyle="#00eaff";
 ctx.beginPath();
 ctx.arc(
   offX+player.x*size+size/2,
   offY+player.y*size+size/2,
   8,0,Math.PI*2
 );
 ctx.fill();

 requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
