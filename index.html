<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin:0; background:black; overflow:hidden; }
canvas { display:block; }

#ui{
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 color:white;
 font-family:sans-serif;
}

#end{
 position:fixed;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 display:none;
 color:white;
 text-align:center;
}

#joy{
 position:fixed;
 bottom:40px;
 left:50%;
 transform:translateX(-50%);
 width:120px;
 height:120px;
 border-radius:50%;
 background:rgba(255,255,255,0.08);
}
#stick{
 position:absolute;
 width:50px;
 height:50px;
 border-radius:50%;
 background:#ffd166;
 left:35px;
 top:35px;
}
</style>
</head>
<body>

<div id="ui">Tap to start</div>
<div id="end">
  <h2 id="time"></h2>
  <h3 id="score"></h3>
  <button onclick="restart()">Replay</button>
</div>

<canvas id="c"></canvas>
<div id="joy"><div id="stick"></div></div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b4b6f.mp3">
</audio>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");
c.width = innerWidth;
c.height = innerHeight;

let size = 35;

// MAZE
function generateMaze(n){
 let grid = Array.from({length:n},()=>Array(n).fill(1));
 function carve(x,y){
  grid[y][x]=0;
  let dirs=[[2,0],[-2,0],[0,2],[0,-2]]
    .sort(()=>Math.random()-0.3);
  for(let [dx,dy] of dirs){
    let nx=x+dx, ny=y+dy;
    if(ny>0&&ny<n&&nx>0&&nx<n && grid[ny][nx]===1){
      grid[y+dy/2][x+dx/2]=0;
      carve(nx,ny);
    }
  }
 }
 carve(1,1);
 return grid;
}

let grid = generateMaze(size);
let player={x:1.5,y:1.5};
let goal={x:size-2,y:size-2};

let joy={x:0,y:0};
let startTime=null;
let finished=false;

let score=0;
let speedBoost=0;

// collectibles
let orbs=[];
for(let i=0;i<25;i++){
 let x,y;
 do{
   x=Math.floor(Math.random()*size);
   y=Math.floor(Math.random()*size);
 }while(grid[y][x]!==0 || (x<3&&y<3));
 orbs.push({x,y,active:true});
}

// joystick
const joyDiv=document.getElementById("joy");
const stick=document.getElementById("stick");

joyDiv.ontouchmove=e=>{
 let r=joyDiv.getBoundingClientRect();
 let t=e.touches[0];
 let dx=t.clientX-(r.left+60);
 let dy=t.clientY-(r.top+60);
 let d=Math.hypot(dx,dy);
 if(d>40){ dx*=40/d; dy*=40/d; }
 stick.style.left=(dx+35)+"px";
 stick.style.top=(dy+35)+"px";
 joy.x=dx/40;
 joy.y=dy/40;
};

joyDiv.ontouchend=()=>{
 joy.x=0; joy.y=0;
 stick.style.left="35px";
 stick.style.top="35px";
};

// audio
let audioCtx;
function beep(f,d){
 if(!audioCtx) return;
 let o=audioCtx.createOscillator();
 let g=audioCtx.createGain();
 o.connect(g); g.connect(audioCtx.destination);
 o.frequency.value=f;
 o.start();
 g.gain.setValueAtTime(0.1,audioCtx.currentTime);
 g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);
 o.stop(audioCtx.currentTime+d);
}

document.body.addEventListener("touchstart",()=>{
 if(!startTime){
   startTime=Date.now();
   document.getElementById("ui").innerText="";
   document.getElementById("music").play().catch(()=>{});
   audioCtx=new (window.AudioContext||window.webkitAudioContext)();
 }
},{once:true});

// collision
function isWall(x,y){
 if(x<1||y<1||x>size-2||y>size-2) return true;
 return grid[Math.floor(y)][Math.floor(x)]!==0;
}

function move(){
 let speed=0.05 + speedBoost;
 let steps=4;

 for(let i=0;i<steps;i++){
   let nx=player.x+(joy.x*speed/steps);
   if(!isWall(nx,player.y)) player.x=nx;
   let ny=player.y+(joy.y*speed/steps);
   if(!isWall(player.x,ny)) player.y=ny;
 }
}

// update
function update(){
 if(finished) return;

 move();

 speedBoost*=0.95;

 // collect
 orbs.forEach(o=>{
   if(o.active &&
      Math.floor(player.x)===o.x &&
      Math.floor(player.y)===o.y){
     o.active=false;
     score+=10;
     speedBoost+=0.02;
     beep(500,0.1);
   }
 });

 // win
 if(Math.floor(player.x)===goal.x &&
    Math.floor(player.y)===goal.y){

   finished=true;
   beep(900,0.3);

   let t=((Date.now()-startTime)/1000).toFixed(1);

   document.getElementById("time").innerText="Time: "+t+"s";
   document.getElementById("score").innerText="Score: "+score;
   document.getElementById("end").style.display="block";
 }
}

// draw
function draw(){
 ctx.fillStyle="black";
 ctx.fillRect(0,0,c.width,c.height);

 let cell=Math.min(c.width,c.height)/size;
 let ox=(c.width-cell*size)/2;
 let oy=(c.height-cell*size)/2;

 for(let y=0;y<size;y++){
  for(let x=0;x<size;x++){
    if(grid[y][x]===0){
      ctx.fillStyle="#0a3d62";
      ctx.fillRect(ox+x*cell,oy+y*cell,cell,cell);
    }
  }
 }

 // orbs
 orbs.forEach(o=>{
   if(o.active){
     ctx.fillStyle="gold";
     ctx.beginPath();
     ctx.arc(ox+o.x*cell+cell/2,oy+o.y*cell+cell/2,4,0,Math.PI*2);
     ctx.fill();
   }
 });

 ctx.fillStyle="yellow";
 ctx.fillRect(ox+goal.x*cell,oy+goal.y*cell,cell,cell);

 ctx.shadowColor="red";
 ctx.shadowBlur=15;
 ctx.fillStyle="red";
 ctx.beginPath();
 ctx.arc(
   ox+player.x*cell+cell/2,
   oy+player.y*cell+cell/2,
   cell*0.3,0,Math.PI*2
 );
 ctx.fill();
 ctx.shadowBlur=0;

 if(startTime && !finished){
  let t=((Date.now()-startTime)/1000).toFixed(1);
  document.getElementById("ui").innerText="Time: "+t+"s | Score: "+score;
 }
}

function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}

document.body.onclick=()=>{
 if(!startTime){
   startTime=Date.now();
   document.getElementById("ui").innerText="";
 }
};

function restart(){
 grid=generateMaze(size);
 player={x:1.5,y:1.5};
 score=0;
 speedBoost=0;
 orbs.forEach(o=>o.active=true);
 startTime=Date.now();
 finished=false;
 document.getElementById("end").style.display="none";
}

loop();
</script>

</body>
</html>
