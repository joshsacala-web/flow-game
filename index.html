<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin:0; background:#020617; overflow:hidden; }
canvas { display:block; }
#ui{
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 color:white;
 font-family:sans-serif;
 font-size:20px;
}
</style>
</head>
<body>

<div id="ui">Tap to Start</div>
<canvas id="c"></canvas>

<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

let player, hearts;
let score=0, playing=false, speed=1;

// start
document.body.addEventListener("mousedown",start);
document.body.addEventListener("touchstart",start);

function start(){
 player={x:c.width/2,y:c.height/2};
 hearts=[];
 score=0;
 speed=1;
 playing=true;
}

// movement
c.addEventListener("mousemove",move);
c.addEventListener("touchmove",move);

function move(e){
 if(!playing) return;
 let x=e.touches?e.touches[0].clientX:e.clientX;
 let y=e.touches?e.touches[0].clientY:e.clientY;

 player.x += (x-player.x)*0.25;
 player.y += (y-player.y)*0.25;
}

// spawn
function spawn(){
 hearts.push({
   x:Math.random()*c.width,
   y:Math.random()*c.height,
   vx:(Math.random()-0.5)*3*speed,
   vy:(Math.random()-0.5)*3*speed,
   good:Math.random()>0.3
 });
}

// update
function update(){
 if(!playing) return;

 if(Math.random()<0.05) spawn();

 speed += 0.0005;

 hearts.forEach(h=>{
   h.x += h.vx;
   h.y += h.vy;

   let d=Math.hypot(player.x-h.x,player.y-h.y);

   if(d<20){
     if(h.good){
       score++;
     } else {
       playing=false;
     }
     h.x=-100;
   }
 });

 hearts=hearts.filter(h=>h.x>-50);
}

// draw heart
function heart(x,y,s,color){
 ctx.fillStyle=color;
 ctx.beginPath();
 ctx.moveTo(x,y);
 ctx.bezierCurveTo(x,y-s/2,x-s,y-s/2,x-s,y);
 ctx.bezierCurveTo(x-s,y+s/2,x,y+s,x,y+s);
 ctx.bezierCurveTo(x,y+s,x+s,y+s/2,x+s,y);
 ctx.bezierCurveTo(x+s,y-s/2,x,y-s/2,x,y);
 ctx.fill();
}

// draw
function draw(){
 ctx.fillStyle="#020617";
 ctx.fillRect(0,0,c.width,c.height);

 hearts.forEach(h=>{
   heart(h.x,h.y,12, h.good?"red":"#555");
 });

 if(player){
   ctx.shadowColor="red";
   ctx.shadowBlur=25;
   heart(player.x,player.y,14,"pink");
   ctx.shadowBlur=0;
 }

 let ui=document.getElementById("ui");

 if(playing){
   ui.innerText="Score: "+score;
 } else {
   ui.innerText = score>0
     ? "💔 "+score+" — Tap to retry"
     : "Tap to Start";
 }

 requestAnimationFrame(draw);
}

// loop
function loop(){
 update();
 draw();
}
loop();
</script>

</body>
</html>
