<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin:0; background:#020617; overflow:hidden; font-family:sans-serif; color:white; }

#ui {
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 font-size:20px;
}

#centerMsg{
 position:fixed;
 top:50%;
 width:100%;
 text-align:center;
 font-size:28px;
 transform:translateY(-50%);
}

.heart { position:absolute; font-size:26px; }

#player {
 position:absolute;
 font-size:36px;
 left:50%;
 top:50%;
 transform:translate(-50%,-50%);
}
</style>
</head>
<body>

<div id="ui"></div>
<div id="centerMsg">Tap to Start ❤️</div>
<div id="player">❤️</div>

<script>
let player = document.getElementById("player");
let hearts = [];
let time = 10; // less starting time
let playing = false;
let difficulty = 1;

// audio
let ctxAudio = new (window.AudioContext || window.webkitAudioContext)();
function beep(f,d){
 let o=ctxAudio.createOscillator();
 let g=ctxAudio.createGain();
 o.connect(g); g.connect(ctxAudio.destination);
 o.frequency.value=f;
 o.start();
 g.gain.setValueAtTime(0.1, ctxAudio.currentTime);
 o.stop(ctxAudio.currentTime+d);
}

// start
document.body.addEventListener("click",()=>{
 if(playing) return;
 playing=true;
 time=10;
 difficulty=1;
 hearts.forEach(h=>h.remove());
 hearts=[];
 document.getElementById("centerMsg").innerText="";
});

// move
document.addEventListener("mousemove",move);
document.addEventListener("touchmove",move);

function move(e){
 let x=e.touches?e.touches[0].clientX:e.clientX;
 let y=e.touches?e.touches[0].clientY:e.clientY;
 player.style.left=x+"px";
 player.style.top=y+"px";
}

// spawn (hard tuned)
function spawn(){
 let h=document.createElement("div");
 h.className="heart";

 let r=Math.random();

 if(r>0.95){
   h.type="power"; h.innerText="💛"; // very rare
 } else if(r>0.6){
   h.type="green"; h.innerText="🟢";
 } else if(r>0.3){
   h.type="good"; h.innerText="❤️";
 } else {
   h.type="bad";
   h.innerHTML="<span style='color:black; filter: drop-shadow(0 0 3px white);'>🖤</span>";
 }

 h.x=Math.random()*innerWidth;
 h.y=-20;
 h.speed=3 + Math.random()*3 + difficulty;

 h.style.left=h.x+"px";
 h.style.top=h.y+"px";

 document.body.appendChild(h);
 hearts.push(h);
}

// loop
setInterval(()=>{

 if(!playing) return;

 difficulty += 0.002; // faster ramp

 // more spawns over time
 if(Math.random() < 0.2 + difficulty*0.03) spawn();

 hearts.forEach(h=>{
   h.y += h.speed;
   h.style.top = h.y+"px";

   let px=player.offsetLeft;
   let py=player.offsetTop;

   let hitRange = (h.type==="bad") ? 40 : 30; // black harder to avoid

   if(Math.abs(px-h.x)<hitRange && Math.abs(py-h.y)<hitRange){

     if(h.type==="good"){ time+=1; beep(500,0.07); }
     if(h.type==="green"){ time+=2; beep(700,0.07); } // nerfed slightly
     if(h.type==="power"){ time+=8; beep(900,0.1); }  // nerfed slightly
     if(h.type==="bad"){ time-=12; beep(180,0.15); }  // harsher

     h.remove();
   }

   if(h.y>innerHeight) h.remove();
 });

 hearts = hearts.filter(h=>h.isConnected);

 // faster drain
 time -= 0.06 + difficulty*0.02;

 if(time<=0){
   playing=false;
   document.getElementById("centerMsg").innerText="💀 Game Over — Tap to retry";
 }

 document.getElementById("ui").innerText =
   "Time: "+Math.max(0,time.toFixed(1));

},30);
</script>

</body>
</html>
