<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Heart Maze Clean</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  text-align: center;
  font-family: Arial;
}

canvas {
  display: block;
  margin: auto;
  background: #111;
}

#info {
  margin: 10px;
}
</style>
</head>

<body>

<h2>❤️ Heart Maze</h2>
<div id="info">Level 1</div>
<canvas id="c" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const tile = 20;
const cols = 20;
const rows = 20;

let level = 1;
let player = { x: 10, y: 18 };

// ❤️ heart mask
function inHeart(x,y){
  let nx = (x - cols/2) / (cols/2);
  let ny = (y - rows/2) / (rows/2);
  return Math.pow(nx*nx + ny*ny - 0.3, 3) - nx*nx*ny*ny*ny < 0;
}

// create empty grid
function createGrid(){
  let grid = [];
  for(let y=0;y<rows;y++){
    grid[y]=[];
    for(let x=0;x<cols;x++){
      grid[y][x] = 1; // wall
    }
  }
  return grid;
}

// DFS maze carving
function carveMaze(grid, x, y){
  let dirs = [
    [0,-2],[0,2],[-2,0],[2,0]
  ].sort(()=>Math.random()-0.5);

  for(let [dx,dy] of dirs){
    let nx = x+dx;
    let ny = y+dy;

    if(nx>0 && ny>0 && nx<cols-1 && ny<rows-1){
      if(grid[ny][nx]===1 && inHeart(nx,ny)){
        grid[ny][nx]=0;
        grid[y+dy/2][x+dx/2]=0;
        carveMaze(grid,nx,ny);
      }
    }
  }
}

function generateMaze(){
  let grid = createGrid();

  // carve only inside heart
  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      if(!inHeart(x,y)){
        grid[y][x]=1;
      }
    }
  }

  // start carve
  let sx = 10, sy = 18;
  grid[sy][sx]=0;
  carveMaze(grid,sx,sy);

  // open goal
  grid[1][10]=0;

  return grid;
}

let maze = generateMaze();

function draw(){
  ctx.clearRect(0,0,400,400);

  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      if(maze[y][x]===1){
        ctx.fillStyle="white";
        ctx.fillRect(x*tile,y*tile,tile,tile);
      }
    }
  }

  // goal
  ctx.fillStyle="lime";
  ctx.fillRect(10*tile,1*tile,tile,tile);

  // player
  ctx.fillStyle="cyan";
  ctx.fillRect(player.x*tile,player.y*tile,tile,tile);
}

function move(dx,dy){
  let nx = player.x+dx;
  let ny = player.y+dy;

  if(nx<0||ny<0||nx>=cols||ny>=rows) return;

  if(maze[ny][nx]===1){
    reset();
    return;
  }

  player.x=nx;
  player.y=ny;

  if(nx===10 && ny===1){
    level++;
    nextLevel();
  }
}

function reset(){
  player={x:10,y:18};
}

function nextLevel(){
  maze = generateMaze();
  reset();
  document.getElementById("info").innerText = "Level " + level;
}

// keyboard
document.addEventListener("keydown", e=>{
  if(e.key==="ArrowUp") move(0,-1);
  if(e.key==="ArrowDown") move(0,1);
  if(e.key==="ArrowLeft") move(-1,0);
  if(e.key==="ArrowRight") move(1,0);
});

// swipe
let sx,sy;
canvas.addEventListener("touchstart", e=>{
  sx=e.touches[0].clientX;
  sy=e.touches[0].clientY;
});

canvas.addEventListener("touchend", e=>{
  let dx=e.changedTouches[0].clientX-sx;
  let dy=e.changedTouches[0].clientY-sy;

  if(Math.abs(dx)>Math.abs(dy)){
    move(dx>0?1:-1,0);
  } else {
    move(0,dy>0?1:-1);
  }
});

setInterval(draw,60);

// 🎧 calm loop
let audio = new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b3b3b.mp3");
audio.loop = true;
audio.volume = 0.3;
audio.play().catch(()=>{});
</script>

</body>
</html>
