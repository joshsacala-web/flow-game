<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Heart Maze Final</title>

<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial;
}

canvas {
  position:absolute;
  top:0; left:0;
}

#overlay {
  position:absolute;
  width:100%; height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:rgba(0,0,0,0.6);
  color:white;
}

#joystick {
  position:absolute;
  bottom:40px;
  left:30px;
  width:100px;
  height:100px;
  border-radius:50%;
  background:rgba(255,255,255,0.1);
}

#stick {
  position:absolute;
  width:40px;
  height:40px;
  border-radius:50%;
  background:#00f0ff;
  left:30px;
  top:30px;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="overlay">
  <h1>❤️ HEART MAZE</h1>
  <button onclick="startGame()">Start</button>
</div>

<div id="joystick"><div id="stick"></div></div>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5c6f1b7b1b.mp3?filename=ambient-piano-110624.mp3">
</audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const size=20, cols=25, rows=25;

let grid, player, goal, enemy;
let joyX=0, joyY=0;
let moveTimer=0;
let startTime=0;

// ❤️ AUDIO
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let heartbeatTimer=0;
let glowIntensity=0;

// 🎵 MUSIC
const music=document.getElementById("music");
function startMusic(){
  music.volume=0.4;
  music.play().catch(()=>{});
}

// ❤️ HEART SHAPE
function isHeart(x,y){
  let nx=(x-cols/2)/(cols/2);
  let ny=(y-rows/2)/(rows/2);
  return Math.pow(nx*nx+ny*ny-1,3)-nx*nx*ny*ny*ny<=0;
}

// 🧠 MAZE
function generate(){
  grid=Array.from({length:rows},()=>Array(cols).fill(1));

  function carve(x,y){
    let dirs=[[1,0],[-1,0],[0,1],[0,-1]].sort(()=>Math.random()-0.5);
    for(let [dx,dy] of dirs){
      let nx=x+dx*2, ny=y+dy*2;
      if(grid[ny] && grid[ny][nx]===1 && isHeart(nx,ny)){
        grid[ny][nx]=0;
        grid[y+dy][x+dx]=0;
        carve(nx,ny);
      }
    }
  }

  player={x:12,y:20};
  goal={x:12,y:2};
  grid[player.y][player.x]=0;
  carve(player.x,player.y);
  grid[goal.y][goal.x]=0;

  enemy={x:5,y:10,dir:1};
}

// 🎮 JOYSTICK
const stick=document.getElementById("stick");

document.getElementById("joystick").addEventListener("touchmove", e=>{
  let rect=e.target.getBoundingClientRect();
  let x=e.touches[0].clientX-rect.left-50;
  let y=e.touches[0].clientY-rect.top-50;

  joyX=Math.max(-1,Math.min(1,x/40));
  joyY=Math.max(-1,Math.min(1,y/40));

  stick.style.left=(50+joyX*30)+"px";
  stick.style.top=(50+joyY*30)+"px";
});

document.getElementById("joystick").addEventListener("touchend", ()=>{
  joyX=0; joyY=0;
  stick.style.left="30px";
  stick.style.top="30px";
});

// 🎮 MOVE
function move(){
  if(moveTimer>0){ moveTimer--; return; }

  let dx=0, dy=0;

  if(Math.abs(joyX)>Math.abs(joyY)){
    dx=joyX>0?1:-1;
  } else if(Math.abs(joyY)>0){
    dy=joyY>0?1:-1;
  }

  let nx=player.x+dx;
  let ny=player.y+dy;

  if((dx||dy) && grid[ny] && grid[ny][nx]===0){
    player.x=nx;
    player.y=ny;
    moveTimer=6;
  }
}

// ❤️ HEARTBEAT (DISTORTED)
function playHeartbeat(speed, danger){
  heartbeatTimer--;
  if(heartbeatTimer>0) return;

  glowIntensity=1;

  let osc=audioCtx.createOscillator();
  let gain=audioCtx.createGain();
  let dist=audioCtx.createWaveShaper();

  function curve(a){
    let n=44100, c=new Float32Array(n);
    for(let i=0;i<n;i++){
      let x=i*2/n-1;
      c[i]=(3+a)*x*20*Math.PI/(Math.PI+a*Math.abs(x));
    }
    return c;
  }

  dist.curve=curve(danger*5);

  osc.type = danger>0.6 ? "square" : "sine";
  osc.frequency.value = 70 + danger*40;

  gain.gain.value = 0.2 + danger*0.3;

  osc.connect(dist);
  dist.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime+0.08);

  heartbeatTimer = speed;
}

// 📳 VIBRATE
function vibrate(p){
  if(navigator.vibrate) navigator.vibrate(p);
}

// 🚀 START
function startGame(){
  generate();
  startTime=Date.now();
  document.getElementById("overlay").style.display="none";

  audioCtx.resume();
  startMusic();
}

// 🎨 DRAW
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  let offsetX=(canvas.width-cols*size)/2;
  let offsetY=(canvas.height-rows*size)/2;

  let dist = player ? Math.abs(player.x-enemy.x)+Math.abs(player.y-enemy.y) : 10;
  let danger = 1 - Math.min(dist/10,1);

  playHeartbeat(Math.max(5,dist*3), danger);

  glowIntensity *= 0.92;

  let r=255;
  let g=Math.floor(80*(1-danger));
  let b=Math.floor(120*(1-danger));

  ctx.fillStyle=`rgba(${r},${g},${b},${0.15*glowIntensity*(1+danger)})`;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      if(grid && grid[y][x]===1){
        ctx.fillStyle="#ff4d6d";
        ctx.fillRect(offsetX+x*size,offsetY+y*size,size,size);
      }
    }
  }

  if(player){
    move();

    ctx.fillStyle="#00f0ff";
    ctx.beginPath();
    ctx.arc(offsetX+player.x*size+10,offsetY+player.y*size+10,6,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="#ff00aa";
    ctx.beginPath();
    ctx.arc(offsetX+goal.x*size+10,offsetY+goal.y*size+10,6,0,Math.PI*2);
    ctx.fill();

    if(dist<3) vibrate(50);

    if(player.x===goal.x && player.y===goal.y){
      vibrate([100,50,100]);
      alert("YOU WIN ❤️");
      location.reload();
    }
  }

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
