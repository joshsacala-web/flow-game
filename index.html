<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin:0; background:black; overflow:hidden; }
canvas { display:block; }

#ui{
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 color:white;
 font-family:sans-serif;
}

#end{
 position:fixed;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 display:none;
 color:white;
 text-align:center;
}

button{
 padding:10px 20px;
 margin-top:10px;
 font-size:18px;
}

#joy{
 position:fixed;
 bottom:40px;
 left:50%;
 transform:translateX(-50%);
 width:120px;
 height:120px;
 border-radius:50%;
 background:rgba(255,255,255,0.08);
}
#stick{
 position:absolute;
 width:50px;
 height:50px;
 border-radius:50%;
 background:#ffd166;
 left:35px;
 top:35px;
}
</style>
</head>
<body>

<div id="ui">Tap to start</div>

<div id="end">
  <h2 id="time"></h2>
  <div id="calm"></div>
  <button onclick="restart()">Play Again</button>
</div>

<canvas id="c"></canvas>

<div id="joy"><div id="stick"></div></div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b4b6f.mp3">
</audio>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

// ❤️ CREATE HEART PATH
let path = [];

function heartPath(){
 path = [];
 for(let t=0; t<Math.PI*2; t+=0.02){
   let x = 16*Math.pow(Math.sin(t),3);
   let y = -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));
   path.push({x,y});
 }
}

// normalize path to screen
function getScreenPath(){
 let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
 path.forEach(p=>{
   minX=Math.min(minX,p.x);
   maxX=Math.max(maxX,p.x);
   minY=Math.min(minY,p.y);
   maxY=Math.max(maxY,p.y);
 });

 let scale = Math.min(c.width/(maxX-minX+4), c.height/(maxY-minY+4));

 return path.map(p=>({
   x:(p.x-minX)*scale + 50,
   y:(p.y-minY)*scale + 50
 }));
}

heartPath();
let screenPath = getScreenPath();

let playerIndex = 0;

let checkpointIndex = Math.floor(screenPath.length/2);
let reachedCheckpoint=false;

let joy={x:0,y:0};

let startTime=null;
let finished=false;

// joystick
const joyDiv=document.getElementById("joy");
const stick=document.getElementById("stick");

joyDiv.ontouchmove=e=>{
 let r=joyDiv.getBoundingClientRect();
 let t=e.touches[0];
 let dx=t.clientX-(r.left+60);
 let dy=t.clientY-(r.top+60);
 let d=Math.hypot(dx,dy);
 if(d>40){ dx*=40/d; dy*=40/d; }
 stick.style.left=(dx+35)+"px";
 stick.style.top=(dy+35)+"px";
 joy.x=dx/40;
 joy.y=dy/40;
};

joyDiv.ontouchend=()=>{
 joy.x=0; joy.y=0;
 stick.style.left="35px";
 stick.style.top="35px";
};

// music
document.body.addEventListener("touchstart",()=>{
 if(!startTime){
   startTime=Date.now();
   document.getElementById("ui").innerText="";
   let music=document.getElementById("music");
   music.volume=0.4;
   music.play().catch(()=>{});
 }
},{once:true});

// movement along path
function update(){

 if(finished) return;

 let speed = joy.y * -2; // forward/back

 playerIndex += speed;

 playerIndex = Math.max(0, Math.min(screenPath.length-1, playerIndex));

 if(!reachedCheckpoint && playerIndex >= checkpointIndex){
   reachedCheckpoint=true;
 }

 if(playerIndex >= screenPath.length-2){
   finished=true;

   let t=((Date.now()-startTime)/1000).toFixed(1);
   document.getElementById("time").innerText="Time: "+t+"s";

   let calm = t < 60 ? "😌 Very Calm"
            : t < 120 ? "🙂 Calm"
            : "🔥 Intense";

   document.getElementById("calm").innerText = calm;

   document.getElementById("end").style.display="block";
 }
}

// draw
function draw(){

 ctx.fillStyle="black";
 ctx.fillRect(0,0,c.width,c.height);

 // path glow
 ctx.strokeStyle="#0a3d62";
 ctx.lineWidth=10;
 ctx.beginPath();
 screenPath.forEach((p,i)=>{
   if(i===0) ctx.moveTo(p.x,p.y);
   else ctx.lineTo(p.x,p.y);
 });
 ctx.stroke();

 // checkpoint
 let cp = screenPath[checkpointIndex];
 if(!reachedCheckpoint){
   ctx.fillStyle="cyan";
   ctx.beginPath();
   ctx.arc(cp.x,cp.y,10,0,Math.PI*2);
   ctx.fill();
 }

 // player
 let p = screenPath[Math.floor(playerIndex)];

 ctx.shadowColor="red";
 ctx.shadowBlur=20;

 ctx.fillStyle="red";
 ctx.beginPath();
 ctx.arc(p.x,p.y,reachedCheckpoint?14:10,0,Math.PI*2);
 ctx.fill();

 ctx.shadowBlur=0;

 if(startTime && !finished){
  let t=((Date.now()-startTime)/1000).toFixed(1);
  document.getElementById("ui").innerText="Time: "+t+"s";
 }
}

function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}

function restart(){
 playerIndex=0;
 reachedCheckpoint=false;
 startTime=Date.now();
 finished=false;
 document.getElementById("end").style.display="none";
}

loop();
</script>

</body>
</html>
