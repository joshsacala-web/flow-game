<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Heart Maze Ultimate</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle, #140010, #000);
  font-family: Arial;
  color: white;
}

#ui {
  position: absolute;
  top: 20px;
  width: 100%;
  text-align: center;
}

#title {
  font-size: 26px;
  color: #ff4d6d;
  text-shadow: 0 0 15px #ff4d6d;
}

#msg {
  font-size: 14px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div id="ui">
  <div id="title">❤️ HEART MAZE</div>
  <div id="msg">Reach the glowing heart</div>
</div>

<canvas id="game" width="500" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const size = 20;
const cols = canvas.width / size;
const rows = canvas.height / size;

let time = 0;
let gameState = "play";

let player = { x: 10, y: 18 };
let visualPlayer = { x: 10, y: 18 };

let goal = { x: 10, y: 2 };
let enemy = { x: 5, y: 10, dir: 1 };

// ❤️ heart mask
function isHeart(x, y) {
  let nx = (x - cols/2) / (cols/2);
  let ny = (y - rows/2) / (rows/2);
  return Math.pow(nx*nx + ny*ny - 1, 3) - nx*nx * ny*ny*ny <= 0;
}

// 🧠 SOLVABLE MAZE (simple carve path)
let grid = Array.from({length: rows}, () => Array(cols).fill(1));

function carvePath(x, y) {
  let dirs = [[1,0],[-1,0],[0,1],[0,-1]]
    .sort(() => Math.random() - 0.5);

  for (let [dx, dy] of dirs) {
    let nx = x + dx*2;
    let ny = y + dy*2;

    if (grid[ny] && grid[ny][nx] === 1 && isHeart(nx, ny)) {
      grid[ny][nx] = 0;
      grid[y+dy][x+dx] = 0;
      carvePath(nx, ny);
    }
  }
}

// init maze
for (let y=0;y<rows;y++){
  for (let x=0;x<cols;x++){
    if (isHeart(x,y)) grid[y][x]=1;
  }
}

grid[player.y][player.x]=0;
carvePath(player.x, player.y);
grid[goal.y][goal.x]=0;

// 🎵 SOUND (simple)
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq, dur=0.1){
  let o = audioCtx.createOscillator();
  let g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.value = freq;
  o.start();
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
  o.stop(audioCtx.currentTime + dur);
}

// controls
document.addEventListener("keydown", e=>{
  if (gameState !== "play") return;

  let dx=0, dy=0;
  if(e.key==="ArrowUp")dy=-1;
  if(e.key==="ArrowDown")dy=1;
  if(e.key==="ArrowLeft")dx=-1;
  if(e.key==="ArrowRight")dx=1;

  let nx=player.x+dx;
  let ny=player.y+dy;

  if(grid[ny] && grid[ny][nx]===0){
    player.x=nx;
    player.y=ny;
    beep(400,0.05);
  }
});

// 💀 enemy movement
function updateEnemy(){
  if(time % 20 < 1){
    let nx = enemy.x + enemy.dir;
    if(grid[enemy.y][nx]===0){
      enemy.x = nx;
    } else {
      enemy.dir *= -1;
    }
  }
}

// draw
function draw(){
  time+=0.05;

  ctx.fillStyle="rgba(10,0,10,0.3)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // walls
  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      if(grid[y][x]===1){
        ctx.shadowColor="#ff4d6d";
        ctx.shadowBlur=8;
        ctx.fillStyle="#ff4d6d";
        ctx.fillRect(x*size,y*size,size,size);
        ctx.shadowBlur=0;
      }
    }
  }

  // goal ❤️
  ctx.shadowColor="#ff00aa";
  ctx.shadowBlur=20;
  ctx.fillStyle="#ff00aa";
  ctx.beginPath();
  ctx.arc(goal.x*size+10, goal.y*size+10, 6+Math.sin(time)*2,0,Math.PI*2);
  ctx.fill();
  ctx.shadowBlur=0;

  // enemy 💀
  ctx.shadowColor="#ff0000";
  ctx.shadowBlur=15;
  ctx.fillStyle="#ff0000";
  ctx.fillRect(enemy.x*size+5, enemy.y*size+5,10,10);
  ctx.shadowBlur=0;

  // player
  visualPlayer.x += (player.x - visualPlayer.x)*0.2;
  visualPlayer.y += (player.y - visualPlayer.y)*0.2;

  ctx.shadowColor="#00f0ff";
  ctx.shadowBlur=20;
  ctx.fillStyle="#00f0ff";
  ctx.beginPath();
  ctx.arc(
    visualPlayer.x*size+10,
    visualPlayer.y*size+10,
    6+Math.sin(time*3),
    0,Math.PI*2
  );
  ctx.fill();
  ctx.shadowBlur=0;

  // collision checks
  if(player.x===goal.x && player.y===goal.y && gameState==="play"){
    gameState="win";
    beep(800,0.3);
    document.getElementById("msg").innerText="YOU WIN ❤️";
  }

  if(player.x===enemy.x && player.y===enemy.y && gameState==="play"){
    gameState="lose";
    beep(100,0.3);
    document.getElementById("msg").innerText="GAME OVER 💀";
  }

  if(gameState==="win"){
    ctx.fillStyle="rgba(255,0,100,0.1)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }

  updateEnemy();
  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
