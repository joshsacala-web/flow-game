<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin:0; background:black; overflow:hidden; }
canvas { display:block; }

#joy{
 position:fixed;
 bottom:40px;
 left:50%;
 transform:translateX(-50%);
 width:120px;
 height:120px;
 border-radius:50%;
 background:rgba(255,255,255,0.08);
}
#stick{
 position:absolute;
 width:50px;
 height:50px;
 border-radius:50%;
 background:#ffd166;
 left:35px;
 top:35px;
}

#ui{
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 color:white;
 font-family:sans-serif;
}
</style>
</head>
<body>

<div id="ui">Tap to Start</div>
<canvas id="c"></canvas>
<div id="joy"><div id="stick"></div></div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/11/03/audio_7b9c7b5a6e.mp3">
</audio>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

let player = {x:c.width/2,y:c.height/2};
let joy={x:0,y:0};

let started=false;
let combo=0;
let score=0;

// 🎵 beat system
let bpm = 70;
let beatInterval = 60000 / bpm;
let lastBeat = Date.now();
let beatPulse = 0;

// joystick
const joyDiv=document.getElementById("joy");
const stick=document.getElementById("stick");

joyDiv.ontouchmove=e=>{
 let r=joyDiv.getBoundingClientRect();
 let t=e.touches[0];
 let dx=t.clientX-(r.left+60);
 let dy=t.clientY-(r.top+60);
 let d=Math.hypot(dx,dy);
 if(d>40){ dx*=40/d; dy*=40/d; }
 stick.style.left=(dx+35)+"px";
 stick.style.top=(dy+35)+"px";
 joy.x=dx/40;
 joy.y=dy/40;
};

joyDiv.ontouchend=()=>{
 joy.x=0; joy.y=0;
 stick.style.left="35px";
 stick.style.top="35px";
};

// start
document.body.addEventListener("touchstart",()=>{
 if(!started){
   started=true;
   document.getElementById("ui").innerText="";
   document.getElementById("music").play().catch(()=>{});
 }
},{once:true});

// update
function update(){

 if(!started) return;

 let now = Date.now();

 // beat pulse
 if(now - lastBeat > beatInterval){
   lastBeat = now;
   beatPulse = 1;

   // 🔥 scoring check
   let movement = Math.hypot(joy.x,joy.y);
   if(movement > 0.3){
     combo++;
     score += combo;
   } else {
     combo = 0;
   }
 }

 beatPulse *= 0.9;

 // movement
 let speed = 2.5;
 player.x += joy.x * speed;
 player.y += joy.y * speed;
}

// heart
function heart(x,y,s){
 ctx.beginPath();
 ctx.moveTo(x,y);
 ctx.bezierCurveTo(x,y-s/2,x-s,y-s/2,x-s,y);
 ctx.bezierCurveTo(x-s,y+s/2,x,y+s,x,y+s);
 ctx.bezierCurveTo(x,y+s,x+s,y+s/2,x+s,y);
 ctx.bezierCurveTo(x+s,y-s/2,x,y-s/2,x,y);
 ctx.fill();
}

// draw
function draw(){
 ctx.fillStyle="#020617";
 ctx.fillRect(0,0,c.width,c.height);

 // pulse background
 ctx.fillStyle=`rgba(255,0,0,${beatPulse*0.2})`;
 ctx.fillRect(0,0,c.width,c.height);

 // heart scale with beat
 let size = 20 + beatPulse*10;

 ctx.shadowColor="red";
 ctx.shadowBlur=30;
 ctx.fillStyle="red";
 heart(player.x,player.y,size);
 ctx.shadowBlur=0;

 // UI
 document.getElementById("ui").innerText =
  "Score: "+score+" | Combo: "+combo;
}

function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
