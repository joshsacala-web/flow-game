<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin:0; background:#0b1a26; overflow:hidden; }
canvas { display:block; margin:auto; }

#ui{
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 color:white;
 font-family:sans-serif;
 font-size:18px;
}

#joy {
 position:fixed;
 bottom:30px;
 left:50%;
 transform:translateX(-50%);
 width:110px;height:110px;
 border-radius:50%;
 background:rgba(255,255,255,0.1);
}
#stick {
 width:50px;height:50px;
 background:#ffd166;
 border-radius:50%;
 position:absolute;
 top:30px;left:30px;
}
</style>
</head>
<body>

<div id="ui">Lives: 7 | Time: 120</div>

<canvas id="c"></canvas>
<div id="joy"><div id="stick"></div></div>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

function resize(){
 c.width = innerWidth;
 c.height = innerHeight;
}
resize();
onresize = resize;

// BIGGER MAZE (~2 min play)
const maze = [
"1111111111111111111",
"1000000000100000001",
"1011111110101111101",
"1010000010001000101",
"1010111011111010101",
"1000101000001010001",
"1110101011101010111",
"1000001000100010001",
"1011111010111011101",
"1000000010000010001",
"1110111110111110101",
"1000100000100000101",
"1011101111101110101",
"1010000000001000101",
"1010111111111011101",
"1000000000000000001",
"1111111111111111101"
];

let start = {x:1.5,y:1.5};
let goal = {x:17.5,y:15.5};
let player = {...start};

let lives = 7;
let time = 120;

setInterval(()=>{
 if(time>0) time--;
 document.getElementById("ui").innerText =
  "Lives: "+lives+" | Time: "+time;
},1000);

// joystick
let joy={x:0,y:0};
const stick=document.getElementById("stick");
const joyDiv=document.getElementById("joy");

joyDiv.ontouchmove=e=>{
 let r=joyDiv.getBoundingClientRect();
 let t=e.touches[0];
 let dx=t.clientX-(r.left+55);
 let dy=t.clientY-(r.top+55);
 let d=Math.hypot(dx,dy);
 if(d>40){dx*=40/d;dy*=40/d;}
 stick.style.left=(dx+30)+"px";
 stick.style.top=(dy+30)+"px";
 joy.x=dx/40; joy.y=dy/40;
};
joyDiv.ontouchend=()=>{
 joy.x=joy.y=0;
 stick.style.left="30px";
 stick.style.top="30px";
};

function hitWall(x,y){
 return maze[Math.floor(y)][Math.floor(x)] === "1";
}

function update(){
 let speed=0.08;
 let nx=player.x+joy.x*speed;
 let ny=player.y+joy.y*speed;

 if(hitWall(nx,ny)){
   lives--;
   player = {...start};

   if(lives <= 0){
     alert("Game Over");
     location.reload();
   }
 } else {
   player.x = nx;
   player.y = ny;
 }

 // win
 if(Math.hypot(player.x-goal.x, player.y-goal.y) < 0.5){
   alert("You Win!");
   location.reload();
 }

 draw();
 requestAnimationFrame(update);
}

function draw(){
 ctx.clearRect(0,0,c.width,c.height);

 let size = Math.min(c.width/19, c.height/17);

 let offsetX = (c.width - size*19)/2;
 let offsetY = (c.height - size*17)/2;

 for(let y=0;y<maze.length;y++){
  for(let x=0;x<maze[0].length;x++){

    if(maze[y][x]=="1"){
      ctx.fillStyle="#000000"; // walls
    } else {
      ctx.fillStyle="#0a3d62"; // path
    }

    ctx.fillRect(offsetX+x*size,offsetY+y*size,size,size);
  }
 }

 // start
 ctx.fillStyle="lime";
 ctx.fillRect(offsetX+start.x*size,offsetY+start.y*size,size,size);

 // goal
 ctx.fillStyle="gold";
 ctx.fillRect(offsetX+goal.x*size,offsetY+goal.y*size,size,size);

 // player ❤️
 ctx.fillStyle="red";
 ctx.font = size+"px serif";
 ctx.fillText("❤",
  offsetX+player.x*size,
  offsetY+player.y*size
 );
}

update();
</script>
</body>
</html>
