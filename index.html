<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Heart Maze</title>

<style>
body {
  margin:0;
  background: radial-gradient(circle, #140010, #000);
  overflow:hidden;
  font-family:Arial;
  color:white;
}

canvas { display:block; margin:auto; }

#overlay {
  position:absolute;
  width:100%; height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
  text-align:center;
}

#hud {
  position:absolute;
  top:10px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 20px;
  box-sizing:border-box;
  font-size:14px;
}

button {
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#ff4d6d;
  color:white;
}
</style>
</head>

<body>

<div id="hud">
  <div id="time">Time: 0.0</div>
  <div id="score">Score: 0</div>
  <div id="best">Best: 0</div>
  <div><button onclick="toggleMusic()">🎵</button></div>
</div>

<canvas id="game" width="500" height="500"></canvas>

<div id="overlay">
  <h1>❤️ HEART MAZE</h1>
  <p id="msg">Tap Start</p>
  <button onclick="startGame()">Start</button>
</div>

<!-- 🎵 stable music -->
<audio id="bgMusic" loop preload="auto">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5c6f1b7b1b.mp3?filename=ambient-piano-110624.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const size=20, cols=25, rows=25;

let state="menu";
let grid, player, goal, enemy;
let playerVisual;
let startTime=0, elapsed=0, score=0;
let best = localStorage.getItem("heart_best") || 0;
let particles=[];

document.getElementById("best").innerText="Best: "+best;

// 🎵 MUSIC (robust)
const bgMusic = document.getElementById("bgMusic");
let musicEnabled = true;

function safePlayMusic(){
  if(!musicEnabled) return;
  bgMusic.volume = 0.4;

  let playPromise = bgMusic.play();
  if(playPromise !== undefined){
    playPromise.catch(()=>{});
  }
}

function toggleMusic(){
  musicEnabled = !musicEnabled;
  if(musicEnabled) safePlayMusic();
  else bgMusic.pause();
}

// ❤️ heart shape
function isHeart(x,y){
  let nx=(x-cols/2)/(cols/2);
  let ny=(y-rows/2)/(rows/2);
  return Math.pow(nx*nx+ny*ny-1,3)-nx*nx*ny*ny*ny<=0;
}

// 🧠 maze
function generate(){
  grid=Array.from({length:rows},()=>Array(cols).fill(1));

  function carve(x,y){
    let dirs=[[1,0],[-1,0],[0,1],[0,-1]].sort(()=>Math.random()-0.5);
    for(let [dx,dy] of dirs){
      let nx=x+dx*2, ny=y+dy*2;
      if(grid[ny] && grid[ny][nx]===1 && isHeart(nx,ny)){
        grid[ny][nx]=0;
        grid[y+dy][x+dx]=0;
        carve(nx,ny);
      }
    }
  }

  player={x:12,y:20};
  goal={x:12,y:2};

  grid[player.y][player.x]=0;
  carve(player.x,player.y);
  grid[goal.y][goal.x]=0;

  enemy={x:5,y:10,dir:1};
  playerVisual={...player};
}

// particles
function spawnParticles(x,y){
  for(let i=0;i<6;i++){
    particles.push({
      x,y,
      vx:(Math.random()-0.5)*2,
      vy:(Math.random()-0.5)*2,
      life:20
    });
  }
}

// controls
document.addEventListener("keydown",e=>{
  if(state!=="play") return;

  let dx=0,dy=0;
  if(e.key==="ArrowUp")dy=-1;
  if(e.key==="ArrowDown")dy=1;
  if(e.key==="ArrowLeft")dx=-1;
  if(e.key==="ArrowRight")dx=1;

  let nx=player.x+dx, ny=player.y+dy;

  if(grid[ny] && grid[ny][nx]===0){
    player.x=nx;
    player.y=ny;
    spawnParticles(nx*size,ny*size);
  }
});

// start
function startGame(){
  generate();
  state="play";
  startTime=Date.now();
  score=0;

  document.getElementById("overlay").style.display="none";

  // required for browser audio
  safePlayMusic();
}

// enemy
function updateEnemy(){
  if(Math.random()<0.05){
    let nx=enemy.x+enemy.dir;
    if(grid[enemy.y][nx]===0){
      enemy.x=nx;
    } else enemy.dir*=-1;
  }
}

// draw loop
function draw(){
  ctx.clearRect(0,0,500,500);

  if(state==="play"){
    elapsed=(Date.now()-startTime)/1000;
    score=Math.max(0, Math.floor(1000 - elapsed*50));

    document.getElementById("time").innerText="Time: "+elapsed.toFixed(1);
    document.getElementById("score").innerText="Score: "+score;
  }

  // walls
  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      if(grid && grid[y][x]===1){
        ctx.fillStyle="#ff4d6d";
        ctx.fillRect(x*size,y*size,size,size);
      }
    }
  }

  if(state==="play"){
    // goal pulse
    ctx.fillStyle="#ff00aa";
    ctx.beginPath();
    ctx.arc(goal.x*size+10,goal.y*size+10,6+Math.sin(Date.now()/200)*2,0,Math.PI*2);
    ctx.fill();

    // enemy
    ctx.fillStyle="red";
    ctx.fillRect(enemy.x*size+5,enemy.y*size+5,10,10);

    // player smooth
    playerVisual.x+=(player.x-playerVisual.x)*0.2;
    playerVisual.y+=(player.y-playerVisual.y)*0.2;

    ctx.fillStyle="#00f0ff";
    ctx.beginPath();
    ctx.arc(playerVisual.x*size+10,playerVisual.y*size+10,6,0,Math.PI*2);
    ctx.fill();

    // particles
    particles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.life--;
      ctx.fillRect(p.x,p.y,2,2);
    });
    particles=particles.filter(p=>p.life>0);

    // win
    if(player.x===goal.x && player.y===goal.y){
      state="win";
      if(score>best){
        best=score;
        localStorage.setItem("heart_best", best);
      }
      showOverlay("YOU WIN ❤️ Score: "+score);
    }

    // lose
    if(player.x===enemy.x && player.y===enemy.y){
      state="lose";
      showOverlay("GAME OVER 💀");
    }

    updateEnemy();
  }

  requestAnimationFrame(draw);
}

// overlay
function showOverlay(msg){
  document.getElementById("msg").innerText=msg;
  document.getElementById("overlay").style.display="flex";
  document.getElementById("best").innerText="Best: "+best;
}

draw();
</script>

</body>
</html>
