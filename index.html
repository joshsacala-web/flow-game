<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin:0; background:black; overflow:hidden; }
canvas { display:block; }

#joy{
 position:fixed;
 bottom:40px;
 left:50%;
 transform:translateX(-50%);
 width:120px;
 height:120px;
 border-radius:50%;
 background:rgba(255,255,255,0.08);
}
#stick{
 position:absolute;
 width:50px;
 height:50px;
 border-radius:50%;
 background:#ffd166;
 left:35px;
 top:35px;
}

#ui{
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 color:white;
 font-family:sans-serif;
 font-size:18px;
}

#end{
 position:fixed;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 color:white;
 font-family:sans-serif;
 text-align:center;
 display:none;
}
button{
 padding:10px 20px;
 font-size:18px;
 margin-top:10px;
}
</style>
</head>
<body>

<div id="ui">Time: 0.0s</div>
<div id="end"></div>

<canvas id="c"></canvas>
<div id="joy"><div id="stick"></div></div>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

let startTime = Date.now();
let finished = false;

let player = {x:120,y:120,size:10};
let spawn = {x:120,y:120};
let joy={x:0,y:0};

// finish
let finish = {x:420,y:520};

// checkpoints
let checkpoints = [
 {x:200,y:140,hit:false},
 {x:360,y:260,hit:false},
 {x:260,y:420,hit:false}
];

// joystick
const joyDiv=document.getElementById("joy");
const stick=document.getElementById("stick");

joyDiv.ontouchmove=e=>{
 let r=joyDiv.getBoundingClientRect();
 let t=e.touches[0];
 let dx=t.clientX-(r.left+60);
 let dy=t.clientY-(r.top+60);
 let d=Math.hypot(dx,dy);
 if(d>40){ dx*=40/d; dy*=40/d; }
 stick.style.left=(dx+35)+"px";
 stick.style.top=(dy+35)+"px";
 joy.x=dx/40;
 joy.y=dy/40;
};

joyDiv.ontouchend=()=>{
 joy.x=0; joy.y=0;
 stick.style.left="35px";
 stick.style.top="35px";
};

// maze
let walls = [
 {x:40,y:40,w:440,h:20},
 {x:40,y:40,w:20,h:520},
 {x:40,y:540,w:440,h:20},
 {x:460,y:40,w:20,h:520},

 {x:120,y:120,w:300,h:20},
 {x:120,y:120,w:20,h:200},
 {x:120,y:300,w:250,h:20},
 {x:350,y:200,w:20,h:220},
 {x:200,y:200,w:180,h:20},
 {x:200,y:200,w:20,h:180},
 {x:200,y:360,w:200,h:20},
];

// collision
function collides(nx,ny){
 let r=player.size;
 for(let w of walls){
   if(nx+r>w.x && nx-r<w.x+w.w &&
      ny+r>w.y && ny-r<w.y+w.h){
     return true;
   }
 }
 return false;
}

// update
function update(){
 if(finished) return;

 let speed=2.8;

 let nx = player.x + joy.x*speed;
 let ny = player.y + joy.y*speed;

 if(!collides(nx,player.y)) player.x=nx;
 if(!collides(player.x,ny)) player.y=ny;

 // checkpoints
 checkpoints.forEach(cp=>{
   if(!cp.hit){
     if(Math.hypot(player.x-cp.x,player.y-cp.y)<15){
       cp.hit=true;
       player.size+=2;
       spawn.x=cp.x;
       spawn.y=cp.y;
     }
   }
 });

 // finish check
 if(Math.hypot(player.x-finish.x,player.y-finish.y)<15){
   finished=true;
   showEnd();
 }
}

// rating
function getRating(time){
 if(time < 30) return "😌 Zen Master";
 if(time < 60) return "🙂 Calm Flow";
 if(time < 90) return "😅 Getting There";
 return "😤 Chaos Mode";
}

function showEnd(){
 let t = ((Date.now()-startTime)/1000).toFixed(1);
 let rating = getRating(t);

 let end = document.getElementById("end");
 end.style.display="block";
 end.innerHTML = `
   <h2>Finished!</h2>
   <p>Time: ${t}s</p>
   <p>${rating}</p>
   <button onclick="location.reload()">Play Again</button>
 `;
}

// heart
function heart(x,y,s){
 ctx.fillStyle="red";
 ctx.beginPath();
 ctx.moveTo(x,y);
 ctx.bezierCurveTo(x,y-s/2,x-s,y-s/2,x-s,y);
 ctx.bezierCurveTo(x-s,y+s/2,x,y+s,x,y+s);
 ctx.bezierCurveTo(x,y+s,x+s,y+s/2,x+s,y);
 ctx.bezierCurveTo(x+s,y-s/2,x,y-s/2,x,y);
 ctx.fill();
}

// draw
function draw(){
 ctx.fillStyle="#020617";
 ctx.fillRect(0,0,c.width,c.height);

 // maze
 ctx.shadowColor="#00aaff";
 ctx.shadowBlur=10;
 ctx.fillStyle="#0a3d62";
 walls.forEach(w=>ctx.fillRect(w.x,w.y,w.w,w.h));
 ctx.shadowBlur=0;

 // checkpoints
 checkpoints.forEach(cp=>{
   ctx.beginPath();
   ctx.arc(cp.x,cp.y,6,0,Math.PI*2);
   ctx.fillStyle = cp.hit ? "#00ffcc" : "#ffd166";
   ctx.fill();
 });

 // finish
 ctx.beginPath();
 ctx.arc(finish.x,finish.y,8,0,Math.PI*2);
 ctx.fillStyle="#00ff00";
 ctx.fill();

 // player
 ctx.shadowColor="red";
 ctx.shadowBlur=20;
 heart(player.x,player.y,player.size);
 ctx.shadowBlur=0;

 // timer
 if(!finished){
   let t=((Date.now()-startTime)/1000).toFixed(1);
   document.getElementById("ui").innerText="Time: "+t+"s";
 }
}

function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
