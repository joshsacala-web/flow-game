<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin:0; background:#020617; overflow:hidden; }
canvas { display:block; }
#ui{
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 color:white;
 font-family:sans-serif;
 font-size:18px;
}
</style>
</head>
<body>

<div id="ui">Tap anywhere to start</div>
<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

let player = {x:c.width/2, y:c.height/2};
let enemies = [];
let score = 0;
let combo = 0;
let playing = false;

// START GAME
function start(){
 playing = true;
 enemies = [];
 score = 0;
 combo = 0;
}

// tap starts game AND moves player instantly
document.body.addEventListener("touchstart", e=>{
 start();
 move(e);
});
document.body.addEventListener("mousedown", e=>{
 start();
 move(e);
});

// movement
function move(e){
 if(!playing) return;
 let x = e.touches ? e.touches[0].clientX : e.clientX;
 let y = e.touches ? e.touches[0].clientY : e.clientY;

 player.x = x;
 player.y = y;
}

c.addEventListener("touchmove", move);
c.addEventListener("mousemove", move);

// spawn enemies
function spawn(){
 let angle = Math.random()*Math.PI*2;
 let dist = Math.max(c.width,c.height);

 enemies.push({
   x: player.x + Math.cos(angle)*dist,
   y: player.y + Math.sin(angle)*dist,
   speed: 1.5 + score*0.02,
   near:false
 });
}

// update
function update(){
 if(!playing) return;

 score += 0.03;

 if(Math.random() < 0.03) spawn();

 enemies.forEach(e=>{
   let dx = player.x - e.x;
   let dy = player.y - e.y;
   let d = Math.hypot(dx,dy);

   e.x += dx/d * e.speed;
   e.y += dy/d * e.speed;

   if(d < 18){
     playing = false;
   }

   if(d < 40 && !e.near){
     e.near = true;
     combo++;
   }
   if(d > 50) e.near = false;
 });
}

// draw heart
function heart(x,y,s,color){
 ctx.fillStyle = color;
 ctx.beginPath();
 ctx.moveTo(x,y);
 ctx.bezierCurveTo(x,y-s/2,x-s,y-s/2,x-s,y);
 ctx.bezierCurveTo(x-s,y+s/2,x,y+s,x,y+s);
 ctx.bezierCurveTo(x,y+s,x+s,y+s/2,x+s,y);
 ctx.bezierCurveTo(x+s,y-s/2,x,y-s/2,x,y);
 ctx.fill();
}

// draw
function draw(){
 ctx.fillStyle = "#020617";
 ctx.fillRect(0,0,c.width,c.height);

 enemies.forEach(e=>{
   heart(e.x,e.y,10,"#ff4d6d");
 });

 ctx.shadowColor = "red";
 ctx.shadowBlur = 25;
 heart(player.x,player.y,14,"red");
 ctx.shadowBlur = 0;

 let ui = document.getElementById("ui");

 if(playing){
   ui.innerText = "Score: " + score.toFixed(1) + " | Combo: " + combo;
 } else {
   ui.innerText = score > 0
     ? "💔 " + score.toFixed(1) + " | Combo " + combo + " — Tap to retry"
     : "Tap anywhere to start";
 }

 requestAnimationFrame(draw);
}

// loop
function loop(){
 update();
 draw();
}
loop();
</script>

</body>
</html>
