<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>River Flow</title>
<style>
body { margin:0; overflow:hidden; background:#000; touch-action:none; }
canvas { display:block; }

#joy {
 position:absolute;
 bottom:40px;
 left:50%;
 transform:translateX(-50%);
 width:140px;height:140px;
 border-radius:50%;
 background:rgba(255,255,255,0.1);
}

#stick {
 position:absolute;
 width:60px;height:60px;
 border-radius:50%;
 background:#ffd166;
 left:40px;top:40px;
 box-shadow:0 0 20px #ffd166;
}

#msg {
 position:absolute;
 top:15px;
 width:100%;
 text-align:center;
 color:#fff;
 font-family:sans-serif;
}
</style>
</head>

<body>

<div id="msg">Tap to start 🌊</div>
<canvas id="c"></canvas>
<div id="joy"><div id="stick"></div></div>

<audio id="audio" loop></audio>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");
c.width = innerWidth;
c.height = innerHeight;

let player = {x:100,y:100};
let vel = {x:0,y:0};

let joy = {x:0,y:0};
const stick = document.getElementById("stick");

// 🎮 joystick
document.getElementById("joy").addEventListener("touchmove", e=>{
 let r = e.target.getBoundingClientRect();
 let x = e.touches[0].clientX - r.left - 70;
 let y = e.touches[0].clientY - r.top - 70;

 let dist = Math.hypot(x,y);
 let max = 50;
 if(dist>max){ x*=max/dist; y*=max/dist; }

 joy.x = x/max;
 joy.y = y/max;

 stick.style.left = (70+x-30)+"px";
 stick.style.top = (70+y-30)+"px";
});

document.getElementById("joy").addEventListener("touchend", ()=>{
 joy.x=0; joy.y=0;
 stick.style.left="40px";
 stick.style.top="40px";
});

// 🎵 real working mobile audio
let started=false;
document.body.addEventListener("click", ()=>{
 if(started) return;
 started=true;

 let a=document.getElementById("audio");
 a.src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5c6f1b7b1b.mp3";
 a.volume=0.4;
 a.play().catch(()=>{});

 document.getElementById("msg").innerText="";
});

// 🌊 draw loop
let t=0;
function draw(){
 t+=0.02;

 // 🌅 sunset sky
 let g = ctx.createLinearGradient(0,0,0,c.height);
 g.addColorStop(0,"#ff9966");
 g.addColorStop(0.5,"#ff5e62");
 g.addColorStop(1,"#2c3e50");
 ctx.fillStyle=g;
 ctx.fillRect(0,0,c.width,c.height);

 // 🌊 water flow
 for(let i=0;i<40;i++){
  ctx.fillStyle="rgba(255,255,255,0.05)";
  let y = (i*50 + (t*200)%50);
  ctx.fillRect(0,y,c.width,20);
 }

 // 🎮 movement (smooth)
 vel.x += joy.x * 0.6;
 vel.y += joy.y * 0.6;

 vel.x *= 0.9;
 vel.y *= 0.9;

 player.x += vel.x;
 player.y += vel.y;

 // keep in bounds
 player.x = Math.max(50,Math.min(c.width-50,player.x));
 player.y = Math.max(50,Math.min(c.height-50,player.y));

 // ❤️ player (centered feel)
 let cx = c.width/2;
 let cy = c.height/2;

 ctx.fillStyle="#fff";
 ctx.beginPath();
 ctx.moveTo(cx,cy+10);
 ctx.bezierCurveTo(cx+15,cy-5,cx+25,cy+10,cx,cy+25);
 ctx.bezierCurveTo(cx-25,cy+10,cx-15,cy-5,cx,cy+10);
 ctx.fill();

 // glow
 ctx.shadowColor="#ffd166";
 ctx.shadowBlur=30;
 ctx.beginPath();
 ctx.arc(cx,cy,20,0,Math.PI*2);
 ctx.fill();
 ctx.shadowBlur=0;

 requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
