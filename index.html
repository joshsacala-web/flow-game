<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin:0; background:#020617; overflow:hidden; }
#ui{
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 color:white;
 font-family:sans-serif;
 font-size:22px;
}
canvas{ display:block; }
</style>
</head>
<body>

<div id="ui">Tap to Start</div>
<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

let heart, score=0, playing=false;
let timer=1000;

// start game
document.body.addEventListener("touchstart",()=>{
 if(!playing){
   startGame();
 }
});

function startGame(){
 score=0;
 timer=1000;
 playing=true;
 spawnHeart();
}

function spawnHeart(){
 heart = {
   x: Math.random()*(c.width-100)+50,
   y: Math.random()*(c.height-150)+80,
   size: 30
 };

 setTimeout(()=>{
   if(playing){
     // missed
     playing=false;
   }
 }, timer);

 // speed up
 timer *= 0.92;
}

// tap detection
c.addEventListener("touchstart",e=>{
 if(!playing) return;

 let t = e.touches[0];
 let dx = t.clientX - heart.x;
 let dy = t.clientY - heart.y;

 if(Math.hypot(dx,dy) < heart.size){
   score++;
   spawnHeart();
 } else {
   playing=false;
 }
});

// heart draw
function drawHeart(x,y,s){
 ctx.fillStyle="red";
 ctx.beginPath();
 ctx.moveTo(x,y);
 ctx.bezierCurveTo(x,y-s/2,x-s,y-s/2,x-s,y);
 ctx.bezierCurveTo(x-s,y+s/2,x,y+s,x,y+s);
 ctx.bezierCurveTo(x,y+s,x+s,y+s/2,x+s,y);
 ctx.bezierCurveTo(x+s,y-s/2,x,y-s/2,x,y);
 ctx.fill();
}

// draw loop
function draw(){
 ctx.fillStyle="#020617";
 ctx.fillRect(0,0,c.width,c.height);

 if(playing && heart){
   drawHeart(heart.x,heart.y,heart.size);
   document.getElementById("ui").innerText="Score: "+score;
 } else {
   document.getElementById("ui").innerText =
     score>0 ? "💔 Score: "+score+" — Tap to retry"
             : "Tap to Start";
 }

 requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
