<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin:0; background:#0b1a26; overflow:hidden; }
canvas { display:block; margin:auto; }

#ui{
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 color:white;
 font-family:sans-serif;
 font-size:18px;
}

#menu{
 position:fixed;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 display:none;
 text-align:center;
}

button{
 padding:10px 20px;
 margin:10px;
 font-size:18px;
}
#joy {
 position:fixed;
 bottom:30px;
 left:50%;
 transform:translateX(-50%);
 width:110px;height:110px;
 border-radius:50%;
 background:rgba(255,255,255,0.08);
}
#stick {
 width:50px;height:50px;
 background:#ffd166;
 border-radius:50%;
 position:absolute;
 top:30px;left:30px;
}
</style>
</head>
<body>

<div id="ui">Tap to begin</div>

<div id="menu">
  <div id="result"></div>
  <button onclick="restart()">Play Again</button>
  <button onclick="exitGame()">Exit</button>
</div>

<canvas id="c"></canvas>
<div id="joy"><div id="stick"></div></div>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

function resize(){ c.width=innerWidth; c.height=innerHeight; }
resize(); onresize=resize;

// HARDER MAZE
const maze = [
"1111111111111111111",
"1000000010000000001",
"1011111010111111101",
"1010001010000000101",
"1010111011111010101",
"1000100000001010001",
"1110101111101010111",
"1000001000100010001",
"1011111010111011101",
"1000000010000010001",
"1110111110111110101",
"1000100000100000101",
"1011101111101110101",
"1010000000001000101",
"1010111111111011101",
"1000000000000000001",
"1111111111111111101"
];

let start={x:1.5,y:1.5};
let goal={x:17.5,y:15.5};
let player={...start};

let joy={x:0,y:0};
let startTime=null;
let finished=false;
let trail=[];

// joystick
const stick=document.getElementById("stick");
const joyDiv=document.getElementById("joy");

joyDiv.ontouchmove=e=>{
 let r=joyDiv.getBoundingClientRect();
 let t=e.touches[0];
 let dx=t.clientX-(r.left+55);
 let dy=t.clientY-(r.top+55);
 let d=Math.hypot(dx,dy);
 if(d>40){dx*=40/d;dy*=40/d;}
 stick.style.left=(dx+30)+"px";
 stick.style.top=(dy+30)+"px";
 joy.x=dx/40; joy.y=dy/40;
};
joyDiv.ontouchend=()=>{
 joy.x=joy.y=0;
 stick.style.left="30px";
 stick.style.top="30px";
};

function canMove(x,y){
 return maze[Math.floor(y)][Math.floor(x)]==="0";
}

function update(){

 if(!finished){

   let speed=0.06;

   let nx=player.x+joy.x*speed;
   if(canMove(nx,player.y)) player.x=nx;

   let ny=player.y+joy.y*speed;
   if(canMove(player.x,ny)) player.y=ny;

   trail.push({x:player.x,y:player.y});
   if(trail.length>20) trail.shift();

   // win
   if(Math.hypot(player.x-goal.x, player.y-goal.y)<0.5){
     finished=true;

     let time=((Date.now()-startTime)/1000).toFixed(1);

     document.getElementById("result").innerText =
       "Time: "+time+"s";

     document.getElementById("menu").style.display="block";
   }
 }

 draw();
 requestAnimationFrame(update);
}

// start timer
document.body.onclick=()=>{
 if(!startTime){
   startTime=Date.now();
   document.getElementById("ui").innerText="";
 }
};

function restart(){
 location.reload();
}
function exitGame(){
 window.close();
}

function draw(){
 ctx.clearRect(0,0,c.width,c.height);

 let size=Math.min(c.width/19,c.height/17);
 let ox=(c.width-size*19)/2;
 let oy=(c.height-size*17)/2;

 for(let y=0;y<maze.length;y++){
  for(let x=0;x<maze[0].length;x++){
    ctx.fillStyle = maze[y][x]=="1" ? "#000" : "#0a3d62";
    ctx.fillRect(ox+x*size,oy+y*size,size,size);
  }
 }

 // trail
 trail.forEach((p,i)=>{
   ctx.fillStyle="rgba(255,100,100,"+(i/20)+")";
   ctx.beginPath();
   ctx.arc(ox+p.x*size,oy+p.y*size,3,0,Math.PI*2);
   ctx.fill();
 });

 // start
 ctx.fillStyle="lime";
 ctx.fillRect(ox+start.x*size,oy+start.y*size,size,size);

 // goal
 ctx.fillStyle="gold";
 ctx.fillRect(ox+goal.x*size,oy+goal.y*size,size,size);

 // player
 ctx.fillStyle="red";
 ctx.font=size+"px serif";
 ctx.fillText("❤",ox+player.x*size,oy+player.y*size);

 // timer
 if(startTime && !finished){
   let time=((Date.now()-startTime)/1000).toFixed(1);
   document.getElementById("ui").innerText="Time: "+time+"s";
 }
}

update();
</script>
</body>
</html>
