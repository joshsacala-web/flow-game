<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin:0; background:#020617; overflow:hidden; color:white; font-family:sans-serif; }
#ui{
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 font-size:22px;
}
#buttons{
 position:fixed;
 bottom:0;
 width:100%;
 display:flex;
}
.btn{
 flex:1;
 height:120px;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:30px;
 background:#111;
}
.left{ background:#1e293b; }
.right{ background:#1e293b; }
</style>
</head>
<body>

<div id="ui">Tap LEFT or RIGHT to start</div>
<canvas id="c"></canvas>

<div id="buttons">
  <div class="btn left">⬅️</div>
  <div class="btn right">➡️</div>
</div>

<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let heartY, correctSide, playing=false, score=0, speed=3;

function start(){
 heartY=0;
 correctSide=Math.random()<0.5?"left":"right";
 playing=true;
 score=0;
 speed=3;
}

document.querySelector(".left").onclick=()=>input("left");
document.querySelector(".right").onclick=()=>input("right");

function input(side){
 if(!playing){
   start();
   return;
 }

 if(side===correctSide){
   score++;
   speed+=0.3;
   heartY=0;
   correctSide=Math.random()<0.5?"left":"right";
 } else {
   playing=false;
 }
}

function heart(x,y,s){
 ctx.fillStyle="red";
 ctx.beginPath();
 ctx.moveTo(x,y);
 ctx.bezierCurveTo(x,y-s/2,x-s,y-s/2,x-s,y);
 ctx.bezierCurveTo(x-s,y+s/2,x,y+s,x,y+s);
 ctx.bezierCurveTo(x,y+s,x+s,y+s/2,x+s,y);
 ctx.bezierCurveTo(x+s,y-s/2,x,y-s/2,x,y);
 ctx.fill();
}

function loop(){
 ctx.fillStyle="#020617";
 ctx.fillRect(0,0,c.width,c.height);

 if(playing){
   heartY+=speed;

   let x=c.width/2;

   // draw split
   ctx.strokeStyle="#444";
   ctx.lineWidth=6;
   ctx.beginPath();
   ctx.moveTo(x,heartY);
   ctx.lineTo(x-80,heartY+120);
   ctx.moveTo(x,heartY);
   ctx.lineTo(x+80,heartY+120);
   ctx.stroke();

   heart(x,heartY,20);

   // decision line
   if(heartY>c.height-200){
     document.getElementById("ui").innerText="Choose!";
   } else {
     document.getElementById("ui").innerText="Score: "+score;
   }

   // missed input
   if(heartY>c.height){
     playing=false;
   }

 } else {
   document.getElementById("ui").innerText =
     score>0 ? "💔 "+score+" — Tap to retry" : "Tap LEFT or RIGHT to start";
 }

 requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
