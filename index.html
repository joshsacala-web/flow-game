<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin:0; background:#020617; overflow:hidden; }
canvas { display:block; }

#ui{
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 color:white;
 font-family:sans-serif;
 font-size:22px;
}
</style>
</head>
<body>

<div id="ui">Tap to Start</div>
<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

let player, hearts=[];
let playing=false, score=0;

// start
document.body.addEventListener("touchstart",()=>{
 if(!playing) startGame();
});

function startGame(){
 player = {x:c.width/2};
 hearts=[];
 score=0;
 playing=true;
}

// spawn
function spawn(){
 hearts.push({
   x: Math.random()*c.width,
   y: -20,
   speed: 2 + Math.random()*2 + score*0.05,
   good: Math.random() > 0.3 // 70% good, 30% bad
 });
}

// movement
c.addEventListener("touchmove",e=>{
 if(!playing) return;
 player.x = e.touches[0].clientX;
});

// heart draw
function drawHeart(x,y,s,color){
 ctx.fillStyle=color;
 ctx.beginPath();
 ctx.moveTo(x,y);
 ctx.bezierCurveTo(x,y-s/2,x-s,y-s/2,x-s,y);
 ctx.bezierCurveTo(x-s,y+s/2,x,y+s,x,y+s);
 ctx.bezierCurveTo(x,y+s,x+s,y+s/2,x+s,y);
 ctx.bezierCurveTo(x+s,y-s/2,x,y-s/2,x,y);
 ctx.fill();
}

// update
function update(){
 if(!playing) return;

 if(Math.random()<0.03) spawn();

 hearts.forEach(h=>{
   h.y += h.speed;

   // collision
   if(Math.abs(h.x - player.x) < 30 && h.y > c.height-80){
     if(h.good){
       score++;
     } else {
       playing=false;
     }
     h.y = c.height+100;
   }

   // miss good heart
   if(h.good && h.y > c.height){
     playing=false;
   }
 });

 hearts = hearts.filter(h=>h.y < c.height+50);
}

// draw
function draw(){
 ctx.fillStyle="#020617";
 ctx.fillRect(0,0,c.width,c.height);

 // falling hearts
 hearts.forEach(h=>{
   drawHeart(h.x,h.y,15, h.good ? "red" : "#555");
 });

 // player
 drawHeart(player?.x || 0, c.height-50, 20, "pink");

 // UI
 let ui=document.getElementById("ui");

 if(playing){
   ui.innerText="Score: "+score;
 } else {
   ui.innerText = score>0
     ? "💔 Score: "+score+" — Tap to retry"
     : "Tap to Start";
 }

 requestAnimationFrame(draw);
}

function loop(){
 update();
 draw();
}

loop();
</script>

</body>
</html>
