<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Heart Maze Mobile</title>

<style>
body {
  margin:0;
  background: radial-gradient(circle, #140010, #000);
  overflow:hidden;
  font-family:Arial;
  color:white;
  touch-action:none;
}

canvas { display:block; margin:auto; }

#hud {
  position:absolute;
  top:10px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 15px;
  font-size:14px;
}

#overlay {
  position:absolute;
  width:100%; height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
}

button {
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#ff4d6d;
  color:white;
}

#joystick {
  position:absolute;
  bottom:40px;
  left:40px;
  width:100px;
  height:100px;
  border-radius:50%;
  background:rgba(255,255,255,0.1);
}

#stick {
  position:absolute;
  width:40px;
  height:40px;
  border-radius:50%;
  background:#00f0ff;
  left:30px;
  top:30px;
}
</style>
</head>

<body>

<div id="hud">
  <div id="time">0.0</div>
  <div id="score">0</div>
</div>

<canvas id="game" width="500" height="500"></canvas>

<div id="overlay">
  <h1>❤️ HEART MAZE</h1>
  <button onclick="startGame()">Start</button>
</div>

<div id="joystick">
  <div id="stick"></div>
</div>

<!-- 🎵 REAL ONLINE MUSIC (no upload needed) -->
<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5c6f1b7b1b.mp3?filename=ambient-piano-110624.mp3" type="audio/mpeg">
</audio>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const size=20, cols=25, rows=25;

let grid, player, goal, enemy;
let playerVisual;
let startTime=0, score=0;

// 🎵 MUSIC (safe start)
const music=document.getElementById("bgMusic");
function startMusic(){
  music.volume=0.4;
  music.play().catch(()=>{});
}

// ❤️ heart
function isHeart(x,y){
  let nx=(x-cols/2)/(cols/2);
  let ny=(y-rows/2)/(rows/2);
  return Math.pow(nx*nx+ny*ny-1,3)-nx*nx*ny*ny*ny<=0;
}

// maze
function generate(){
  grid=Array.from({length:rows},()=>Array(cols).fill(1));

  function carve(x,y){
    let dirs=[[1,0],[-1,0],[0,1],[0,-1]].sort(()=>Math.random()-0.5);
    for(let [dx,dy] of dirs){
      let nx=x+dx*2, ny=y+dy*2;
      if(grid[ny] && grid[ny][nx]===1 && isHeart(nx,ny)){
        grid[ny][nx]=0;
        grid[y+dy][x+dx]=0;
        carve(nx,ny);
      }
    }
  }

  player={x:12,y:20};
  goal={x:12,y:2};
  grid[player.y][player.x]=0;
  carve(player.x,player.y);
  grid[goal.y][goal.x]=0;

  enemy={x:5,y:10,dir:1};
  playerVisual={...player};
}

// 🎮 JOYSTICK
let joyX=0, joyY=0;
const stick=document.getElementById("stick");

document.getElementById("joystick").addEventListener("touchmove", e=>{
  let rect=e.target.getBoundingClientRect();
  let x=e.touches[0].clientX-rect.left-50;
  let y=e.touches[0].clientY-rect.top-50;

  joyX=Math.max(-1,Math.min(1,x/40));
  joyY=Math.max(-1,Math.min(1,y/40));

  stick.style.left=(50+joyX*30)+"px";
  stick.style.top=(50+joyY*30)+"px";
});

document.getElementById("joystick").addEventListener("touchend", ()=>{
  joyX=0; joyY=0;
  stick.style.left="30px";
  stick.style.top="30px";
});

// movement
let moveTimer=0;
function move(){
  if(moveTimer>0){ moveTimer--; return; }

  let dx=0, dy=0;

  if(Math.abs(joyX)>Math.abs(joyY)){
    dx=joyX>0?1:-1;
  } else if(Math.abs(joyY)>0){
    dy=joyY>0?1:-1;
  }

  let nx=player.x+dx, ny=player.y+dy;

  if((dx||dy) && grid[ny] && grid[ny][nx]===0){
    player.x=nx;
    player.y=ny;
    moveTimer=6;
  }
}

// start
function startGame(){
  generate();
  startTime=Date.now();
  document.getElementById("overlay").style.display="none";
  startMusic();
}

// enemy
function updateEnemy(){
  if(Math.random()<0.05){
    let nx=enemy.x+enemy.dir;
    if(grid[enemy.y][nx]===0) enemy.x=nx;
    else enemy.dir*=-1;
  }
}

// draw
function draw(){
  ctx.clearRect(0,0,500,500);

  let time=(Date.now()-startTime)/1000;
  score=Math.max(0,Math.floor(1000-time*50));

  document.getElementById("time").innerText="Time: "+time.toFixed(1);
  document.getElementById("score").innerText="Score: "+score;

  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      if(grid && grid[y][x]===1){
        ctx.fillStyle="#ff4d6d";
        ctx.fillRect(x*size,y*size,size,size);
      }
    }
  }

  if(player){
    move();

    ctx.fillStyle="#ff00aa";
    ctx.beginPath();
    ctx.arc(goal.x*size+10,goal.y*size+10,6,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="red";
    ctx.fillRect(enemy.x*size+5,enemy.y*size+5,10,10);

    playerVisual.x+=(player.x-playerVisual.x)*0.2;
    playerVisual.y+=(player.y-playerVisual.y)*0.2;

    ctx.fillStyle="#00f0ff";
    ctx.beginPath();
    ctx.arc(playerVisual.x*size+10,playerVisual.y*size+10,6,0,Math.PI*2);
    ctx.fill();

    if(player.x===goal.x && player.y===goal.y){
      alert("YOU WIN ❤️ Score: "+score);
      location.reload();
    }

    if(player.x===enemy.x && player.y===enemy.y){
      alert("GAME OVER 💀");
      location.reload();
    }

    updateEnemy();
  }

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
