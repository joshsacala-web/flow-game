<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin:0; background:#020617; overflow:hidden; }
canvas { display:block; }
#ui{
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 color:white;
 font-family:sans-serif;
 font-size:20px;
}
</style>
</head>
<body>

<div id="ui">Tap to Start</div>
<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

let player, enemies, score, playing;

// start
document.body.addEventListener("touchstart", startGame);

function startGame(){
 player = {x:c.width/2, y:c.height/2};
 enemies = [];
 score = 0;
 playing = true;
}

// movement
c.addEventListener("touchmove", e=>{
 if(!playing) return;
 player.x = e.touches[0].clientX;
 player.y = e.touches[0].clientY;
});

// spawn enemies
function spawn(){
 let side = Math.floor(Math.random()*4);
 let e = {x:0,y:0};

 if(side===0){ e.x=0; e.y=Math.random()*c.height; }
 if(side===1){ e.x=c.width; e.y=Math.random()*c.height; }
 if(side===2){ e.x=Math.random()*c.width; e.y=0; }
 if(side===3){ e.x=Math.random()*c.width; e.y=c.height; }

 e.speed = 1.5 + score*0.02;
 enemies.push(e);
}

// heart draw
function heart(x,y,s,color){
 ctx.fillStyle=color;
 ctx.beginPath();
 ctx.moveTo(x,y);
 ctx.bezierCurveTo(x,y-s/2,x-s,y-s/2,x-s,y);
 ctx.bezierCurveTo(x-s,y+s/2,x,y+s,x,y+s);
 ctx.bezierCurveTo(x,y+s,x+s,y+s/2,x+s,y);
 ctx.bezierCurveTo(x+s,y-s/2,x,y-s/2,x,y);
 ctx.fill();
}

// update
function update(){
 if(!playing) return;

 score += 0.02;

 if(Math.random()<0.03) spawn();

 enemies.forEach(e=>{
   let dx = player.x - e.x;
   let dy = player.y - e.y;
   let d = Math.hypot(dx,dy);

   e.x += dx/d * e.speed;
   e.y += dy/d * e.speed;

   if(d < 20){
     playing = false;
   }
 });
}

// draw
function draw(){
 ctx.fillStyle="#020617";
 ctx.fillRect(0,0,c.width,c.height);

 enemies.forEach(e=>{
   heart(e.x,e.y,10,"#ff4d6d");
 });

 if(player){
   ctx.shadowColor="red";
   ctx.shadowBlur=20;
   heart(player.x,player.y,14,"red");
   ctx.shadowBlur=0;
 }

 let ui = document.getElementById("ui");

 if(playing){
   ui.innerText = "Score: " + score.toFixed(1);
 } else {
   ui.innerText = score>0
     ? "💔 " + score.toFixed(1) + " — Tap to retry"
     : "Tap to Start";
 }

 requestAnimationFrame(draw);
}

function loop(){
 update();
 draw();
}

loop();
</script>

</body>
</html>
