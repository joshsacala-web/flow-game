<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>River Flow</title>

<style>
body {
  margin:0;
  overflow:hidden;
  background:#87ceeb;
}

canvas {
  position:absolute;
  top:0;
  left:0;
}

#overlay {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:rgba(0,0,0,0.4);
  color:white;
  font-family:Arial;
}

#joystick {
  position:absolute;
  bottom:40px;
  left:30px;
  width:110px;
  height:110px;
  border-radius:50%;
  background:rgba(255,255,255,0.15);
  backdrop-filter: blur(6px);
}

#stick {
  position:absolute;
  width:44px;
  height:44px;
  border-radius:50%;
  background:white;
  left:33px;
  top:33px;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="overlay">
  <h1>🚤 River Flow</h1>
  <button onclick="startGame()">Start</button>
</div>

<div id="joystick"><div id="stick"></div></div>

<audio id="waves" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/02/23/audio_4c2a0c7d74.mp3?filename=ocean-waves-112906.mp3">
</audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// boat physics
let boat = { x: 200, y: 200, vx: 0, vy: 0 };

// joystick
let joyX = 0, joyY = 0;
const stick = document.getElementById("stick");

document.getElementById("joystick").addEventListener("touchmove", e=>{
  let rect = e.target.getBoundingClientRect();
  let x = e.touches[0].clientX - rect.left - 55;
  let y = e.touches[0].clientY - rect.top - 55;

  joyX = Math.max(-1, Math.min(1, x/40));
  joyY = Math.max(-1, Math.min(1, y/40));

  stick.style.left = (55 + joyX*30) + "px";
  stick.style.top  = (55 + joyY*30) + "px";
});

document.getElementById("joystick").addEventListener("touchend", ()=>{
  joyX = 0; joyY = 0;
  stick.style.left="33px";
  stick.style.top="33px";
});

// start
function startGame(){
  document.getElementById("overlay").style.display="none";
  document.getElementById("waves").volume = 0.4;
  document.getElementById("waves").play().catch(()=>{});
}

// water animation
let t = 0;

// draw
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  t += 0.01;

  // 🌊 water gradient
  let grad = ctx.createLinearGradient(0,0,0,canvas.height);
  grad.addColorStop(0,"#6ec6ff");
  grad.addColorStop(1,"#00aaff");
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // 🌊 wave lines
  ctx.strokeStyle = "rgba(255,255,255,0.2)";
  for(let i=0;i<20;i++){
    ctx.beginPath();
    for(let x=0;x<canvas.width;x+=20){
      let y = Math.sin(x*0.01 + t + i) * 10 + i*30;
      ctx.lineTo(x,y);
    }
    ctx.stroke();
  }

  // 🚤 smooth physics
  boat.vx += joyX * 0.2;
  boat.vy += joyY * 0.2;

  boat.vx *= 0.95;
  boat.vy *= 0.95;

  boat.x += boat.vx;
  boat.y += boat.vy;

  // 🚤 draw boat
  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(boat.x, boat.y, 10, 0, Math.PI*2);
  ctx.fill();

  // ✨ soft vignette
  let g = ctx.createRadialGradient(
    canvas.width/2, canvas.height/2, 100,
    canvas.width/2, canvas.height/2, canvas.width
  );
  g.addColorStop(0,"rgba(0,0,0,0)");
  g.addColorStop(1,"rgba(0,0,0,0.3)");
  ctx.fillStyle = g;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
