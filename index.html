<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin:0; background:#0b1a26; overflow:hidden; }
canvas { display:block; margin:auto; }

#ui{
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 color:white;
 font-family:sans-serif;
 font-size:18px;
}

#menu{
 position:fixed;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 display:none;
 text-align:center;
 color:white;
}

button{
 padding:12px 24px;
 margin:10px;
 font-size:18px;
 border:none;
 border-radius:8px;
}

#joy {
 position:fixed;
 bottom:30px;
 left:50%;
 transform:translateX(-50%);
 width:110px;height:110px;
 border-radius:50%;
 background:rgba(255,255,255,0.08);
}
#stick {
 width:50px;height:50px;
 background:#ffd166;
 border-radius:50%;
 position:absolute;
 top:30px;left:30px;
}
</style>
</head>
<body>

<div id="ui">Tap to start</div>

<div id="menu">
  <h2 id="result"></h2>
  <button onclick="restart()">Play Again</button>
</div>

<canvas id="c"></canvas>
<div id="joy"><div id="stick"></div></div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_9b1b62b9bb.mp3" type="audio/mp3">
</audio>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

function resize(){ c.width=innerWidth; c.height=innerHeight; }
resize(); onresize=resize;

// GUARANTEED SOLVABLE MAZE
const maze = [
"111111111111111",
"100000000000001",
"101111111111101",
"100000000000101",
"111111111110101",
"100000000010001",
"101111111010111",
"100000001010001",
"111111101011101",
"100000001000001",
"101111111111101",
"100000000000001",
"111111111111101",
"100000000000001",
"111111111111111"
];

let start={x:1.5,y:1.5};
let goal={x:13.5,y:13.5};

let player, joy, startTime, finished;

function init(){
 player={...start};
 joy={x:0,y:0};
 startTime=null;
 finished=false;
 document.getElementById("menu").style.display="none";
}

init();

// joystick
const stick=document.getElementById("stick");
const joyDiv=document.getElementById("joy");

joyDiv.ontouchmove=e=>{
 let r=joyDiv.getBoundingClientRect();
 let t=e.touches[0];
 let dx=t.clientX-(r.left+55);
 let dy=t.clientY-(r.top+55);
 let d=Math.hypot(dx,dy);
 if(d>40){dx*=40/d;dy*=40/d;}
 stick.style.left=(dx+30)+"px";
 stick.style.top=(dy+30)+"px";
 joy.x=dx/40; joy.y=dy/40;
};
joyDiv.ontouchend=()=>{
 joy.x=joy.y=0;
 stick.style.left="30px";
 stick.style.top="30px";
};

// START + MUSIC
document.body.onclick=()=>{
 if(!startTime){
   startTime=Date.now();
   document.getElementById("ui").innerText="";
   document.getElementById("music").play().catch(()=>{});
 }
};

function canMove(x,y){
 return maze[Math.floor(y)][Math.floor(x)]==="0";
}

function update(){

 if(!finished){

   let speed=0.07;

   let nx=player.x+joy.x*speed;
   if(canMove(nx,player.y)) player.x=nx;

   let ny=player.y+joy.y*speed;
   if(canMove(player.x,ny)) player.y=ny;

   // WIN
   if(Math.hypot(player.x-goal.x, player.y-goal.y)<0.5){
     finished=true;

     let time=((Date.now()-startTime)/1000).toFixed(1);

     document.getElementById("result").innerText =
       "Finished in "+time+"s";

     document.getElementById("menu").style.display="block";
   }
 }

 draw();
 requestAnimationFrame(update);
}

function restart(){
 init();
}

function draw(){
 ctx.clearRect(0,0,c.width,c.height);

 let size=Math.min(c.width/15,c.height/15);
 let ox=(c.width-size*15)/2;
 let oy=(c.height-size*15)/2;

 for(let y=0;y<maze.length;y++){
  for(let x=0;x<maze[0].length;x++){
    ctx.fillStyle = maze[y][x]=="1" ? "#000" : "#0a3d62";
    ctx.fillRect(ox+x*size,oy+y*size,size,size);
  }
 }

 // start
 ctx.fillStyle="lime";
 ctx.fillRect(ox+start.x*size,oy+start.y*size,size,size);

 // finish
 ctx.fillStyle="gold";
 ctx.fillRect(ox+goal.x*size,oy+goal.y*size,size,size);

 // player
 ctx.fillStyle="red";
 ctx.font=size+"px serif";
 ctx.fillText("❤",ox+player.x*size,oy+player.y*size);

 // timer
 if(startTime && !finished){
   let t=((Date.now()-startTime)/1000).toFixed(1);
   document.getElementById("ui").innerText="Time: "+t+"s";
 }
}

update();
</script>
</body>
</html>
