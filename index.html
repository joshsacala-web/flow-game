<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin:0; background:#1e2a38; overflow:hidden; }
canvas { display:block; margin:auto; }

#joy {
 position:fixed;
 bottom:30px;
 left:50%;
 transform:translateX(-50%);
 width:110px;height:110px;
 border-radius:50%;
 background:rgba(255,255,255,0.1);
}
#stick {
 width:50px;height:50px;
 background:#ffd166;
 border-radius:50%;
 position:absolute;
 top:30px;left:30px;
}
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="joy"><div id="stick"></div></div>

<audio id="audio" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b4b6f.mp3">
</audio>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

function resize(){
 c.width = innerWidth;
 c.height = innerHeight;
}
resize();
onresize = resize;

// SIMPLE HEART MAZE (clean, not broken)
const maze = [
"111111111111111",
"100000111000001",
"101110111011101",
"101000000000101",
"101011111110101",
"100010000010001",
"111010111010111",
"100000101000001",
"101111101111101",
"100000000000001",
"111111111111111"
];

let player = {x:1.5,y:1.5};

let joy={x:0,y:0};

const stick=document.getElementById("stick");
const joyDiv=document.getElementById("joy");

joyDiv.ontouchmove=e=>{
 let r=joyDiv.getBoundingClientRect();
 let t=e.touches[0];
 let dx=t.clientX-(r.left+55);
 let dy=t.clientY-(r.top+55);
 let d=Math.hypot(dx,dy);
 if(d>40){dx*=40/d;dy*=40/d;}
 stick.style.left=(dx+30)+"px";
 stick.style.top=(dy+30)+"px";
 joy.x=dx/40; joy.y=dy/40;
};
joyDiv.ontouchend=()=>{
 joy.x=joy.y=0;
 stick.style.left="30px";
 stick.style.top="30px";
};

// AUDIO START
document.body.onclick=()=>{
 document.getElementById("audio").play();
};

function update(){
 let speed=0.08;
 let nx=player.x+joy.x*speed;
 let ny=player.y+joy.y*speed;

 if(maze[Math.floor(ny)][Math.floor(nx)]=="0"){
   player.x=nx;
   player.y=ny;
 }

 draw();
 requestAnimationFrame(update);
}

function draw(){
 ctx.clearRect(0,0,c.width,c.height);

 let size = Math.min(c.width/15, c.height/11);

 // center maze
 let offsetX = (c.width - size*15)/2;
 let offsetY = (c.height - size*11)/2;

 // draw maze
 for(let y=0;y<maze.length;y++){
  for(let x=0;x<maze[0].length;x++){
    if(maze[y][x]=="1"){
      ctx.fillStyle="#2c3e50";
      ctx.fillRect(offsetX+x*size,offsetY+y*size,size,size);
    }
  }
 }

 // player
 ctx.font = size+"px serif";
 ctx.fillText("❤",
  offsetX+player.x*size,
  offsetY+player.y*size
 );
}

update();
</script>
</body>
</html>
