<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin:0; background:black; overflow:hidden; }
canvas { display:block; }

#ui{
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 color:white;
 font-family:sans-serif;
}

#end{
 position:fixed;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 display:none;
 color:white;
 text-align:center;
}

button{
 padding:10px 20px;
 margin-top:10px;
 font-size:18px;
}

#joy{
 position:fixed;
 bottom:40px;
 left:50%;
 transform:translateX(-50%);
 width:120px;
 height:120px;
 border-radius:50%;
 background:rgba(255,255,255,0.08);
}
#stick{
 position:absolute;
 width:50px;
 height:50px;
 border-radius:50%;
 background:#ffd166;
 left:35px;
 top:35px;
}
</style>
</head>
<body>

<div id="ui">Tap to start</div>

<div id="end">
  <h2 id="time"></h2>
  <button onclick="restart()">Play Again</button>
</div>

<canvas id="c"></canvas>

<div id="joy"><div id="stick"></div></div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b4b6f.mp3">
</audio>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

let size = 41;

// SAME MAZE
function generateMaze(n){
 let grid = Array.from({length:n},()=>Array(n).fill(1));

 function carve(x,y){
  grid[y][x]=0;
  let dirs=[[2,0],[-2,0],[0,2],[0,-2]]
    .sort(()=>Math.random()-0.5);

  for(let [dx,dy] of dirs){
    let nx=x+dx, ny=y+dy;
    if(ny>0&&ny<n&&nx>0&&nx<n && grid[ny][nx]===1){
      grid[y+dy/2][x+dx/2]=0;
      carve(nx,ny);
    }
  }
 }

 carve(1,1);
 return grid;
}

let grid = generateMaze(size);

let player={x:1,y:1};
let goal={x:size-2,y:size-2};

let checkpoint={x:Math.floor(size/2),y:Math.floor(size/2)};
let reachedCheckpoint=false;

let joy={x:0,y:0};

let startTime=null;
let finished=false;

// 🎮 REAL JOYSTICK
const joyDiv=document.getElementById("joy");
const stick=document.getElementById("stick");

joyDiv.ontouchmove=e=>{
 let r=joyDiv.getBoundingClientRect();
 let t=e.touches[0];
 let dx=t.clientX-(r.left+60);
 let dy=t.clientY-(r.top+60);
 let d=Math.hypot(dx,dy);

 if(d>40){ dx*=40/d; dy*=40/d; }

 stick.style.left=(dx+35)+"px";
 stick.style.top=(dy+35)+"px";

 joy.x=dx/40;
 joy.y=dy/40;
};

joyDiv.ontouchend=()=>{
 joy.x=0;
 joy.y=0;
 stick.style.left="35px";
 stick.style.top="35px";
};

// 🎵 GUARANTEED MUSIC START
document.body.addEventListener("touchstart",()=>{
 if(!startTime){
   startTime=Date.now();
   document.getElementById("ui").innerText="";
   let music=document.getElementById("music");
   music.volume=0.4;
   music.play().catch(()=>{});
 }
},{once:true});

function canMove(x,y){
 return grid[Math.floor(y)]?.[Math.floor(x)]===0;
}

function update(){

 if(finished) return;

 let speed=0.08;

 let nx=player.x+joy.x*speed;
 let ny=player.y+joy.y*speed;

 if(canMove(nx,player.y)) player.x=nx;
 if(canMove(player.x,ny)) player.y=ny;

 // checkpoint
 if(!reachedCheckpoint &&
   Math.floor(player.x)===checkpoint.x &&
   Math.floor(player.y)===checkpoint.y){
   reachedCheckpoint=true;
 }

 // win
 if(Math.floor(player.x)===goal.x &&
    Math.floor(player.y)===goal.y){

   finished=true;

   let t=((Date.now()-startTime)/1000).toFixed(1);

   document.getElementById("time").innerText="Time: "+t+"s";
   document.getElementById("end").style.display="block";
 }
}

function draw(){
 ctx.fillStyle="black";
 ctx.fillRect(0,0,c.width,c.height);

 let cell = Math.min(c.width,c.height)/size;
 let ox=(c.width-cell*size)/2;
 let oy=(c.height-cell*size)/2;

 for(let y=0;y<size;y++){
  for(let x=0;x<size;x++){
    if(grid[y][x]===0){
      ctx.fillStyle="#0a3d62";
      ctx.fillRect(ox+x*cell,oy+y*cell,cell,cell);
    }
  }
 }

 // start
 ctx.fillStyle="green";
 ctx.fillRect(ox+cell,oy+cell,cell,cell);

 // goal
 ctx.fillStyle="yellow";
 ctx.fillRect(ox+goal.x*cell,oy+goal.y*cell,cell,cell);

 // checkpoint
 if(!reachedCheckpoint){
   ctx.fillStyle="cyan";
   ctx.fillRect(ox+checkpoint.x*cell,oy+checkpoint.y*cell,cell,cell);
 }

 // ❤️ player
 let r = reachedCheckpoint ? cell*0.45 : cell*0.3;

 ctx.fillStyle="red";
 ctx.beginPath();
 ctx.arc(
   ox+player.x*cell+cell/2,
   oy+player.y*cell+cell/2,
   r,0,Math.PI*2
 );
 ctx.fill();

 // timer
 if(startTime && !finished){
  let t=((Date.now()-startTime)/1000).toFixed(1);
  document.getElementById("ui").innerText="Time: "+t+"s";
 }
}

function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}

function restart(){
 grid = generateMaze(size);
 player={x:1,y:1};
 reachedCheckpoint=false;
 startTime=Date.now();
 finished=false;
 document.getElementById("end").style.display="none";
}

loop();
</script>
</body>
</html>
