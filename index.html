<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Heart Maze+</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<style>
  body { margin:0; overflow:hidden; background:#070e12; color:#cfeaf0; font-family:system-ui,Arial; }
  canvas { display:block; }

  #hud {
    position:absolute; top:10px; left:0; right:0; text-align:center;
    font-weight:600; letter-spacing:.5px; text-shadow:0 0 8px rgba(0,255,255,.3);
  }

  /* bottom-center joystick */
  #joystick {
    position:absolute; bottom:26px; left:50%; transform:translateX(-50%);
    width:120px; height:120px; border-radius:50%;
    background:radial-gradient(circle at 50% 50%, rgba(255,255,255,.15), rgba(255,255,255,.05));
    box-shadow:0 0 20px rgba(0,255,255,.2) inset, 0 0 20px rgba(0,255,255,.15);
  }
  #stick {
    position:absolute; width:48px; height:48px; border-radius:50%;
    background:#00eaff; left:36px; top:36px;
    box-shadow:0 0 14px #00eaff, 0 0 30px rgba(0,234,255,.5);
  }

  #tapOverlay {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,.35); backdrop-filter: blur(2px);
  }
  #tapOverlay .card {
    padding:18px 22px; border-radius:16px;
    background:rgba(10,30,36,.8); box-shadow:0 10px 40px rgba(0,0,0,.5), 0 0 30px rgba(0,255,255,.2) inset;
    text-align:center;
  }
  #tapOverlay button {
    margin-top:10px; padding:10px 16px; border-radius:10px; border:0; cursor:pointer;
    background:#00eaff; color:#002b33; font-weight:700;
    box-shadow:0 0 12px #00eaff, 0 0 30px rgba(0,234,255,.5);
  }
</style>
</head>
<body>

<div id="hud">Score: <span id="score">0</span> • Hearts: <span id="left">0</span></div>

<canvas id="game"></canvas>

<div id="joystick"><div id="stick"></div></div>

<!-- tap-to-enable (unlocks audio) -->
<div id="tapOverlay">
  <div class="card">
    <div style="font-size:20px">❤️ Heart Maze+</div>
    <div style="opacity:.8">Tap to enable sound & start</div>
    <button id="startBtn">Tap to Start</button>
  </div>
</div>

<!-- calm loop -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5c6f1b7b1b.mp3">
</audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
function resize(){ canvas.width = innerWidth; canvas.height = innerHeight; }
resize(); addEventListener('resize', resize);

const size=26, cols=21, rows=21;
let grid=[], player, hearts=[], enemies=[], particles=[];
let joyX=0, joyY=0, dirX=0, dirY=0;
let score=0, running=false;

// ---------- MAZE ----------
function generate(){
  grid = Array.from({length:rows},()=>Array(cols).fill(1));

  function carve(x,y){
    let dirs=[[1,0],[-1,0],[0,1],[0,-1]].sort(()=>Math.random()-0.5);
    for(let [dx,dy] of dirs){
      let nx=x+dx*2, ny=y+dy*2;
      if(grid[ny] && grid[ny][nx]===1){
        grid[ny][nx]=0;
        grid[y+dy][x+dx]=0;
        carve(nx,ny);
      }
    }
  }

  player={x:1,y:1,r:8};
  grid[player.y][player.x]=0;
  carve(player.x,player.y);

  // hearts
  hearts=[];
  for(let i=0;i<14;i++){
    let x,y;
    do{
      x=(Math.random()*cols)|0; y=(Math.random()*rows)|0;
    }while(grid[y][x]!==0 || (x===1&&y===1));
    hearts.push({x,y});
  }

  // enemies (simple ghosts)
  enemies=[];
  for(let i=0;i<3;i++){
    let x,y;
    do{
      x=(Math.random()*cols)|0; y=(Math.random()*rows)|0;
    }while(grid[y][x]!==0 || Math.abs(x-1)+Math.abs(y-1)<6);
    enemies.push({x,y,step:0});
  }

  score=0;
  updateHUD();
}

// ---------- JOYSTICK ----------
const stick=document.getElementById("stick");
const joy=document.getElementById("joystick");

joy.addEventListener("touchmove", e=>{
  let r=joy.getBoundingClientRect();
  let x=e.touches[0].clientX-r.left-60;
  let y=e.touches[0].clientY-r.top-60;
  joyX=Math.max(-1,Math.min(1,x/45));
  joyY=Math.max(-1,Math.min(1,y/45));
  stick.style.left=(60+joyX*36)+"px";
  stick.style.top=(60+joyY*36)+"px";
});
joy.addEventListener("touchend", ()=>{
  joyX=0; joyY=0;
  stick.style.left="36px"; stick.style.top="36px";
});

// ---------- AUDIO (unlocked on tap) ----------
const music=document.getElementById("music");
function start(){
  document.getElementById('tapOverlay').style.display='none';
  generate();
  running=true;
  music.volume=.4;
  music.play().catch(()=>{});
}
document.getElementById('startBtn').onclick=start;
document.getElementById('tapOverlay').onclick=start;

// ---------- GAME ----------
function can(x,y){ return grid[y] && grid[y][x]===0; }

// Pac-like grid movement (choose dominant axis)
function updateDir(){
  if(Math.abs(joyX)>Math.abs(joyY)){
    dirX = joyX>0.5?1:joyX<-0.5?-1:0; dirY=0;
  } else {
    dirY = joyY>0.5?1:joyY<-0.5?-1:0; dirX=0;
  }
}

let moveTick=0;
function movePlayer(){
  updateDir();
  moveTick++;
  if(moveTick%6!==0) return; // pace

  let nx=player.x+dirX, ny=player.y+dirY;
  if(can(nx,ny)){ player.x=nx; player.y=ny; }
}

// simple chase: every few ticks move toward player if possible
function moveEnemies(){
  enemies.forEach(e=>{
    e.step++;
    if(e.step%10!==0) return;

    let options=[[1,0],[-1,0],[0,1],[0,-1]]
      .filter(([dx,dy])=>can(e.x+dx,e.y+dy));

    // bias toward player
    options.sort((a,b)=>{
      let da=Math.abs((e.x+a[0])-player.x)+Math.abs((e.y+a[1])-player.y);
      let db=Math.abs((e.x+b[0])-player.x)+Math.abs((e.y+b[1])-player.y);
      return da-db;
    });

    if(options.length){
      let [dx,dy]=options[0];
      e.x+=dx; e.y+=dy;
    }
  });
}

// particles
function burst(x,y,color){
  for(let i=0;i<16;i++){
    particles.push({
      x,y,
      vx:(Math.random()*2-1)*2,
      vy:(Math.random()*2-1)*2,
      life:30+Math.random()*20,
      color
    });
  }
}
function updateParticles(){
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vx*=0.98; p.vy*=0.98; p.life--;
  });
  particles = particles.filter(p=>p.life>0);
}

// collisions
function checkHearts(){
  for(let i=hearts.length-1;i>=0;i--){
    let h=hearts[i];
    if(h.x===player.x && h.y===player.y){
      hearts.splice(i,1);
      score+=10;
      player.r+=1.4;
      burst(player.x,player.y,"#ff6aa7");
      updateHUD();
      if(hearts.length===0){ win(); }
    }
  }
}
function checkEnemies(){
  for(let e of enemies){
    if(e.x===player.x && e.y===player.y){
      burst(player.x,player.y,"#ff3b3b");
      lose();
      return;
    }
  }
}

function updateHUD(){
  document.getElementById('score').textContent=score;
  document.getElementById('left').textContent=hearts.length;
}

function win(){
  running=false;
  setTimeout(()=>{ alert("You win! Score: "+score); restart(); }, 100);
}
function lose(){
  running=false;
  setTimeout(()=>{ alert("Caught! Try again."); restart(); }, 100);
}
function restart(){
  generate();
  running=true;
}

// ---------- DRAW ----------
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  let offX=(canvas.width-cols*size)/2;
  let offY=(canvas.height-rows*size)/2;

  // glow grid
  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      if(grid[y][x]){
        ctx.fillStyle="#0f2a30";
        ctx.fillRect(offX+x*size, offY+y*size, size, size);
      } else {
        ctx.fillStyle="#08181c";
        ctx.fillRect(offX+x*size, offY+y*size, size, size);
      }
    }
  }

  if(running){
    movePlayer();
    moveEnemies();
    checkHearts();
    checkEnemies();
  }

  // hearts (glow)
  hearts.forEach(h=>{
    let cx=offX+h.x*size+size/2, cy=offY+h.y*size+size/2;
    ctx.shadowColor="#ff6aa7"; ctx.shadowBlur=14;
    ctx.fillStyle="#ff6aa7";
    ctx.beginPath(); ctx.arc(cx,cy,6,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  });

  // enemies
  enemies.forEach(e=>{
    let cx=offX+e.x*size+size/2, cy=offY+e.y*size+size/2;
    ctx.shadowColor="#ff3b3b"; ctx.shadowBlur=10;
    ctx.fillStyle="#ff3b3b";
    ctx.beginPath(); ctx.arc(cx,cy,7,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  });

  // player glow
  let px=offX+player.x*size+size/2, py=offY+player.y*size+size/2;
  ctx.shadowColor="#00eaff"; ctx.shadowBlur=16;
  ctx.fillStyle="#00eaff";
  ctx.beginPath(); ctx.arc(px,py,player.r,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;

  // particles
  particles.forEach(p=>{
    let x=offX+p.x*size+size/2, y=offY+p.y*size+size/2;
    ctx.globalAlpha=Math.max(0,p.life/40);
    ctx.fillStyle=p.color;
    ctx.fillRect(x,y,3,3);
    ctx.globalAlpha=1;
  });
  updateParticles();

  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
