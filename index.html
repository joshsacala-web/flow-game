<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Flow Maze</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
    font-family: sans-serif;
    touch-action: none;
  }

  canvas {
    display: block;
  }

  #ui {
    position: fixed;
    top: 10px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 16px;
  }

  #endScreen {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: rgba(0,0,0,0.8);
    color: white;
  }

  button {
    padding: 12px 20px;
    margin-top: 10px;
    font-size: 16px;
  }
</style>
</head>

<body>

<div id="ui">Time: 0.0s</div>

<canvas id="game"></canvas>

<div id="endScreen">
  <h2 id="finalTime"></h2>
  <button onclick="restart()">Play Again</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let w = canvas.width = innerWidth;
let h = canvas.height = innerHeight;

const cellSize = Math.floor(Math.min(w, h) / 55);
const offsetX = (w - cellSize * 51) / 2;
const offsetY = (h - cellSize * 51) / 2;

// 🔥 HARD MAZE 51x51
function generateMaze(cols, rows) {
  const grid = Array.from({ length: rows }, () => Array(cols).fill(1));
  const start = { x: 1, y: 1 };
  const end = { x: cols - 2, y: rows - 2 };

  function carve(x, y, lastDir = null) {
    const dirs = [[1,0],[-1,0],[0,1],[0,-1]];

    dirs.sort((a,b)=>{
      let da = Math.abs(x+a[0]*2-end.x)+Math.abs(y+a[1]*2-end.y);
      let db = Math.abs(x+b[0]*2-end.x)+Math.abs(y+b[1]*2-end.y);

      if(lastDir && a[0]===lastDir[0] && a[1]===lastDir[1]) da+=3;
      if(lastDir && b[0]===lastDir[0] && b[1]===lastDir[1]) db+=3;

      return da-db + Math.random()*4;
    });

    for(let [dx,dy] of dirs){
      let nx = x+dx*2;
      let ny = y+dy*2;
      if(grid[ny] && grid[ny][nx]===1){
        grid[ny][nx]=0;
        grid[y+dy][x+dx]=0;
        carve(nx,ny,[dx,dy]);
      }
    }
  }

  grid[start.y][start.x]=0;
  carve(start.x,start.y);

  // force path
  let x=start.x,y=start.y;
  while(x!==end.x || y!==end.y){
    if(Math.random()<0.5){
      if(x<end.x)x++; else if(x>end.x)x--;
    } else {
      if(y<end.y)y++; else if(y>end.y)y--;
    }
    grid[y][x]=0;
  }

  // reduce shortcuts
  for(let i=0;i<300;i++){
    let rx=Math.floor(Math.random()*cols);
    let ry=Math.floor(Math.random()*rows);

    let open=0;
    if(grid[ry]?.[rx+1]===0)open++;
    if(grid[ry]?.[rx-1]===0)open++;
    if(grid[ry+1]?.[rx]===0)open++;
    if(grid[ry-1]?.[rx]===0)open++;

    if(grid[ry][rx]===1 && open===1 && Math.random()<0.3){
      grid[ry][rx]=0;
    }
  }

  return {grid,start,end};
}

let {grid,start,end} = generateMaze(51,51);

let player = {
  x: start.x,
  y: start.y
};

let joy = {x: w/2, y: h-80, dx:0, dy:0};

let startTime = performance.now();
let finished = false;

canvas.addEventListener("touchmove", e=>{
  let t = e.touches[0];
  joy.dx = (t.clientX - joy.x)/40;
  joy.dy = (t.clientY - joy.y)/40;
});

function update(){
  if(finished) return;

  let nx = player.x + joy.dx * 0.2;
  let ny = player.y + joy.dy * 0.2;

  if(grid[Math.floor(ny)]?.[Math.floor(nx)]===0){
    player.x = nx;
    player.y = ny;
  }

  if(Math.floor(player.x)===end.x && Math.floor(player.y)===end.y){
    finished = true;
    let time = ((performance.now()-startTime)/1000).toFixed(1);
    document.getElementById("finalTime").innerText = "Finished in "+time+"s";
    document.getElementById("endScreen").style.display="flex";
  }
}

function draw(){
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,w,h);

  for(let y=0;y<51;y++){
    for(let x=0;x<51;x++){
      if(grid[y][x]===0){
        ctx.fillStyle="#0a3a5a";
        ctx.fillRect(offsetX+x*cellSize,offsetY+y*cellSize,cellSize,cellSize);
      }
    }
  }

  // start
  ctx.fillStyle="green";
  ctx.fillRect(offsetX+start.x*cellSize,offsetY+start.y*cellSize,cellSize,cellSize);

  // end
  ctx.fillStyle="yellow";
  ctx.fillRect(offsetX+end.x*cellSize,offsetY+end.y*cellSize,cellSize,cellSize);

  // player ❤️
  ctx.fillStyle="red";
  ctx.beginPath();
  ctx.arc(
    offsetX+player.x*cellSize+cellSize/2,
    offsetY+player.y*cellSize+cellSize/2,
    cellSize/3,0,Math.PI*2
  );
  ctx.fill();

  // joystick
  ctx.fillStyle="rgba(255,200,0,0.6)";
  ctx.beginPath();
  ctx.arc(joy.x,joy.y,30,0,Math.PI*2);
  ctx.fill();

  let time = ((performance.now()-startTime)/1000).toFixed(1);
  document.getElementById("ui").innerText = "Time: "+time+"s";
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

function restart(){
  let m = generateMaze(51,51);
  grid = m.grid;
  start = m.start;
  end = m.end;
  player.x = start.x;
  player.y = start.y;
  startTime = performance.now();
  finished = false;
  document.getElementById("endScreen").style.display="none";
}

loop();
</script>

</body>
</html>
